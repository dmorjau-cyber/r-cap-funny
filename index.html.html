<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Funny Tours</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#f0f3f7;color:#222}
.hdr{background:#1a3a5c;padding:11px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.hdr-t{color:#fff;font-size:15px;font-weight:700}
.hdr-s{color:rgba(255,255,255,.4);font-size:11px;margin-left:6px}
#hi{color:rgba(255,255,255,.45);font-size:11px;margin-left:auto}
.page{max-width:1600px;margin:0 auto;padding:14px 12px}
.tb{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.tb input{padding:6px 10px;border:1px solid #dde2ea;border-radius:6px;font-size:12px;width:190px;outline:none;background:#fafafa}
.tabs{display:flex;gap:3px}
.tab{padding:5px 11px;border-radius:6px;border:1px solid #dde2ea;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:#666}
.tab.on{background:#1a3a5c;color:#fff;border-color:#1a3a5c}
.btn{padding:6px 12px;border-radius:6px;border:1px solid #dde2ea;background:#fff;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap}
.btn:hover{background:#f0f3f7}
.bp{background:#1a3a5c;color:#fff;border-color:#1a3a5c}.bp:hover{background:#14304f}
.bg{background:#1a6b44;color:#fff;border-color:#1a6b44}
.bo{background:#e67e22;color:#fff;border-color:#e67e22}
.br{background:#c0392b;color:#fff;border-color:#c0392b}
.ib{font-size:11px;color:#999;margin-left:auto}
.mw{margin-bottom:16px}
.mband{background:#1a3a5c;color:#fff;padding:7px 14px;border-radius:7px 7px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.msub{font-size:10px;font-weight:400;opacity:.6}
table.voy{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e8ecf0;border-top:none;font-size:12px}
table.voy thead{background:#f5f7fa}
table.voy th{padding:7px 10px;font-size:10px;font-weight:600;color:#666;text-align:left;border-bottom:1px solid #e8ecf0;white-space:nowrap;cursor:pointer}
table.voy td{padding:7px 10px;border-bottom:1px solid #f2f4f7;vertical-align:middle}
table.voy tbody tr{cursor:pointer}
table.voy tbody tr:hover td{background:#f0f5ff}
.bx{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600}
.b1{background:#E6F1FB;color:#0C447C}.bs{background:#FAEEDA;color:#633806}
.bw{width:44px;height:4px;background:#eee;border-radius:2px;display:inline-block;vertical-align:middle;margin-right:4px}
.bf{height:100%;border-radius:2px}
.dbox{background:#fff;border-radius:8px;border:1px solid #e8ecf0;padding:18px}
.dtop{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.dtit{font-size:16px;font-weight:700;color:#1a3a5c;margin-bottom:2px}
.dsub{font-size:11px;color:#999}
.dact{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.stats{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.stat{background:#f5f7fa;border-radius:7px;padding:9px 11px;min-width:90px}
.stl{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.stv{font-size:17px;font-weight:700}
.sec{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px;padding-bottom:3px;border-bottom:2px solid #e8ecf0}
.tg{background:#f0f3f7;border:1px solid #dde;border-radius:3px;padding:1px 7px;font-size:11px;display:inline-block;margin:2px}
.rb{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.rs{padding:3px 10px;border-radius:20px;border:1px solid #dde;background:#f5f5f5;font-size:10px;font-weight:600;cursor:pointer;color:#888}
.ra0{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.ra1{background:#FAEEDA;color:#633806;border-color:#FAC775}
.ra2{background:#EAF3DE;color:#27500A;border-color:#C0DD97}
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:12px}
.hcard{background:#f8f9fc;border:1px solid #e8ecf0;border-radius:7px;padding:9px 10px}
.hnm{font-weight:700;font-size:12px;color:#1a3a5c;margin-bottom:5px}
.prow{display:flex;justify-content:space-between;font-size:10px;color:#666;padding:2px 0;border-bottom:1px solid #eef}
.prow:last-child{border:none}
table.cl{width:100%;border-collapse:collapse;font-size:11px}
table.cl th{padding:5px 7px;background:#1a3a5c;color:#fff;text-align:left;font-size:10px;font-weight:600;white-space:nowrap;border:1px solid #2a4a6c}
table.cl td{padding:5px 7px;border:1px solid #e0e4ea;vertical-align:middle;white-space:nowrap}
table.cl tbody tr:hover td{background:#e8f0ff;cursor:pointer}
table.cl tr.ann td{text-decoration:line-through;color:#c0392b;background:#fff5f5}
table.cl tr:nth-child(even):not(.ann) td{background:#fafbfc}
table.cl tfoot td{background:#f0f3f7;font-weight:700;border:1px solid #ccc}
.nr{text-align:right}.nc{text-align:center}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center}
.mo{background:#fff;border-radius:10px;padding:22px;width:640px;max-width:97vw;max-height:93vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.22)}
.mot{font-size:15px;font-weight:700;color:#1a3a5c;margin-bottom:14px}
.mof{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select{padding:7px 9px;border:1px solid #dde2ea;border-radius:6px;font-size:12px;outline:none;background:#fafafa;width:100%}
.fg.full{grid-column:1/-1}
.slbl{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px;padding-bottom:3px;border-bottom:1px solid #eee}
.back{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px solid #dde;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:12px;color:#555;margin-bottom:12px}
.back:hover{background:#f0f3f7}
.ec{text-align:center;color:#bbb;padding:24px;font-size:12px}
.dbt,.abt,.rbt{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px}
.dbt{color:#ddd}.dbt:hover{color:#e74c3c}
.abt{color:#ddd}.abt:hover{color:#e67e22}
.rbt{color:#27ae60}
.lg{background:#FFFDE7;border-color:#FDD835;color:#827717}  /* Gosselies = jaune */
.lc{background:#FFF3E0;border-color:#FF9800;color:#E65100}  /* Chapelle = orange */
.ll{background:#E3F2FD;border-color:#2196F3;color:#0D47A1}  /* La Louviere = bleu */
.ln{background:#E8F5E9;border-color:#4CAF50;color:#1B5E20}  /* Nimy = vert */
.ls{background:#FFEBEE;border-color:#F44336;color:#B71C1C}  /* Saint Ghislain = rouge */
.lgb{background:#F3E5F5;border-color:#9C27B0;color:#4A148C} /* Gembloux = violet */
.lsp{background:#E8EAF6;border-color:#3F51B5;color:#1A237E} /* Spy = indigo */
.le{background:#F5F5F5;border-color:#9E9E9E;color:#424242}  /* Autre */
.sx{background:#f5f5f5;border-color:#ddd;color:#aaa}
.htl{display:inline-block;background:#1a3a5c;color:#fff;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:900;letter-spacing:.5px;margin-top:2px}
.leg{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.li{display:flex;align-items:center;gap:4px;font-size:11px}
</style>
</head>
<body>
<div class="hdr">
  <span style="font-size:17px">&#9992;</span>
  <span class="hdr-t">Funny Tours</span>
  <span class="hdr-s">R&eacute;capitulatif voyages</span>
  <span id="hi" style="font-size:11px;color:rgba(255,255,255,.45);margin-left:auto"></span>
  <span id="save_status" style="font-size:11px;color:rgba(255,255,255,.5);margin-left:8px"></span>
  <button onclick="saveData()" style="margin-left:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">💾 Sauvegarder</button>
  <button onclick="document.getElementById('xl_input').click()" style="margin-left:6px;background:#e67e22;border:1px solid #ca6f1e;color:#fff;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">📥 Importer Excel</button>
  <input type="file" id="xl_input" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)">
  <button onclick="updateApp()" id="btn_update" style="margin-left:6px;background:#27ae60;border:1px solid #1e8449;color:#fff;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">🔄 Mettre à jour</button>
</div>
<div class="page" id="mc"></div>
<div id="mod"></div>
<script>
// ================================================================
// DONNEES
// ================================================================
var VY = []; // données chargées depuis Supabase // données chargées depuis le serveur via loadData()


// Plan de car 49 places - disposition EXACTE selon Excel Maastricht
// DEUX MODELES DE CARS:
// MAX:    Gauche=45,46 / Droite=49,48,47 (banquette) - numeros CROISSANTS gauche->droite
// OSWALD: Gauche=49,48,47 / Droite=45,46 (banquette) - numeros DECROISSANTS gauche->droite
// Lecture Excel (fond -> avant, gauche -> droite):
// 45-46   |            | 49-48-47   <- banquette fond 5 places
// 41-42   |            | 44-43
// 37-38   |            | 40-39
// 33-34   |            | 36-35
// 29-30   |            | 32-31
// 25-26   |            | 28-27
// (vide)  | (escaliers)| 24-23      <- escaliers cote gauche
//  WC     |            | 22-21      <- WC cote gauche
// 19-20   |            | 18-17
// 15-16   |            | 14-13
// 11-12   |            | 10-9
//  7-8    |            |  6-5
//  3-4    |            |  2-1
// GUIDE   |            | CHAUFFEUR
//
// IMPORTANT: dans l'Excel, un nom sur 2 colonnes = 1 reservation pour LES 2 sieges
// Ex: GATEAU sur col 2-3 = sieges 19 ET 20
// Les sieges se remplissent PAR PAIRES (gauche1+gauche2, droite1+droite2)
// CAR MAX: gauche=petits numeros, droite=grands numeros, banquette fond: G=45-46, D=49-48-47
var CAR_MAX = [
  {L:[45,46], R:[49,48,47]},
  {L:[41,42], R:[44,43]},
  {L:[37,38], R:[40,39]},
  {L:[33,34], R:[36,35]},
  {L:[29,30], R:[32,31]},
  {L:[25,26], R:[28,27]},
  {L:null,    R:[24,23], stairs:true},
  {L:null,    R:[22,21], wc:true},
  {L:[19,20], R:[18,17]},
  {L:[15,16], R:[14,13]},
  {L:[11,12], R:[10,9]},
  {L:[7,8],   R:[6,5]},
  {L:[3,4],   R:[2,1]},
  {sp:true}
];
// CAR OSWALD: gauche=grands numeros, droite=petits numeros, banquette fond: G=49-48-47, D=45-46
var CAR_OSWALD = [
  {L:[49,48,47], R:[45,46]},
  {L:[44,43],    R:[41,42]},
  {L:[40,39],    R:[37,38]},
  {L:[36,35],    R:[33,34]},
  {L:[32,31],    R:[29,30]},
  {L:[28,27],    R:[25,26]},
  {L:[24,23],    R:null, stairs:true},
  {L:[22,21],    R:null, wc:true},
  {L:[18,17],    R:[19,20]},
  {L:[14,13],    R:[15,16]},
  {L:[10,9],     R:[11,12]},
  {L:[6,5],      R:[7,8]},
  {L:[2,1],      R:[3,4]},
  {sp:true}
];
var CAR = CAR_MAX; // par defaut

// ================================================================
// HELPERS
// ================================================================
var CV="list", SI=null, FT="all", ST="", COLL={};
var RL=["Pas de rooming","Rooming non envoyee","Rooming envoyee"];
var RC=["#c0392b","#e67e22","#27ae60"], RB=["#FCEBEB","#FAEEDA","#EAF3DE"];
var MO=["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];

// Types de voyage
var TYPES = {
  '1jour':         {lbl:'1 Jour',          color:'#0C447C', bg:'#E6F1FB'},
  '1jour_disney':  {lbl:'1J Disney',        color:'#6A1B9A', bg:'#F3E5F5'},
  'sejour':        {lbl:'Séjour',           color:'#633806', bg:'#FAEEDA'},
  'disney_sejour': {lbl:'Séjour Disney',    color:'#B71C1C', bg:'#FFEBEE'},
  'grand_voyage':  {lbl:'Grand Voyage',     color:'#1B5E20', bg:'#E8F5E9'}
};
function typeInfo(t){ return TYPES[t]||{lbl:t||'?',color:'#555',bg:'#eee'}; }
function typeBadge(t){ var i=typeInfo(t); return '<span class="bx" style="background:'+i.bg+';color:'+i.color+'">'+i.lbl+'</span>'; }

// Est-ce un séjour (avec chambres) ?
function isSejour(v){ return v.type==='sejour'||v.type==='disney_sejour'||v.type==='grand_voyage'; }
// Est-ce Disney ?
function isDisney(v){ return v.type==='1jour_disney'||v.type==='disney_sejour'; }
// Est-ce que les clients voiture ne comptent pas dans le car ?
function hasVoiture(v){ return v.type==='disney_sejour'; }

// Normalise un lieu libre vers une des 7 villes standard
// "Saint Ghislain parking gare", "SG", "cora la louvière" → ville canonique
var LIEUX_NORM = [
  {ville:'Gosselies',    mots:['goss','charleroi']},
  {ville:'Chapelle',     mots:['chap','herlai']},
  {ville:'La Louvière',  mots:['louv','cora','ll ','la lou']},
  {ville:'Nimy',         mots:['nimy','mons']},
  {ville:'Saint-Ghislain',mots:['ghis','saint-gh','st-gh',' sg','sg ','gare']},
  {ville:'Gembloux',     mots:['gembl']},
  {ville:'Spy',          mots:['spy']}
];
function normaliseLieu(raw){
  if(!raw) return '';
  var r=raw.toLowerCase().trim();
  for(var i=0;i<LIEUX_NORM.length;i++){
    var ln=LIEUX_NORM[i];
    for(var j=0;j<ln.mots.length;j++){
      if(r.indexOf(ln.mots[j])>=0) return ln.ville;
    }
  }
  return raw; // inconnu: garder tel quel
}

function tp(c) {
  if(c.voit) return 0;
  var calc=(c.a1p||0)+(c.e1p||0)+(c.a2p||0)+(c.e2p||0)+(c.bts||0)
    +(c.a1||0)+(c.a2||0)+(c.a3||0)+(c.a4||0)+(c.en||0)+(c.bb||0);
  return calc || (c.tot||0);
}
function tpAll(c) {
  var calc=(c.a1p||0)+(c.e1p||0)+(c.a2p||0)+(c.e2p||0)+(c.bts||0)
    +(c.a1||0)+(c.a2||0)+(c.a3||0)+(c.a4||0)+(c.en||0)+(c.bb||0);
  return calc || (c.tot||0);
}
function rest(v) { var staff=(v.ch_nb||0)+(v.acc_nb||0); return v.pl - staff - v.cl.filter(function(c){return !c.an;}).reduce(function(s,c){return s+tp(c);},0); }
function caV(v)  { return Math.round(v.cl.filter(function(c){return !c.an;}).reduce(function(s,c){return s+pf(c.px);},0)*100)/100; }
function rcV(v)  { return Math.round(v.cl.filter(function(c){return !c.an;}).reduce(function(s,c){return s+pf(c.rc);},0)*100)/100; }
function solV(v) { return Math.round(v.cl.filter(function(c){return !c.an;}).reduce(function(s,c){return s+pf(c.px)-pf(c.rc);},0)*100)/100; }
function pf(n) { return parseFloat(n||0); }
function rnd(n) { return Math.round(n*100)/100; }
function fm(n) { return Number(n||0).toLocaleString("fr-BE")+" \u20AC"; }
function sn(v) { return (v===null||v===undefined||v==="") ? "" : String(v); }
function gv(id) { var e=document.getElementById(id); return e?e.value:""; }
function sv(id,v) { var e=document.getElementById(id); if(e) e.value=v; }
function cm() { document.getElementById("mod").innerHTML=""; }
function cmo(e) { if(e.target.id==="ov") cm(); }
function lc(l) {
  l=(l||"").toLowerCase();
  if(l.indexOf("goss")>=0) return "lg";
  if(l.indexOf("chap")>=0) return "lc";
  if(l.indexOf("ll")>=0||l.indexOf("louv")>=0) return "ll";
  if(l.indexOf("nimy")>=0) return "ln";
  if(l.indexOf("ghis")>=0||l.indexOf("sg")>=0) return "ls";
  if(l.indexOf("gembl")>=0) return "lgb";
  if(l.indexOf("spy")>=0) return "lsp";
  return "le";
}
function dp(nm) {
  var n=(nm||"").toLowerCase();
  if(n.indexOf("avt")>=0||n.indexOf("avant")>=0) return "avant";
  if(n.indexOf("wc")>=0||n.indexOf("toil")>=0) return "wc";
  if(n.indexOf("fond")>=0) return "fond";
  if(n.indexOf("milieu")>=0) return "milieu";
  return null;
}

// ================================================================
// LISTE VOYAGES
// ================================================================
var SD={};
function tog(k) { COLL[k]=!COLL[k]; rl(); }
function srt(k) { SD[k]=(SD[k]===1)?-1:1; VY.sort(function(a,b){var va=a[k]||"",vb=b[k]||""; return va<vb?-SD[k]:va>vb?SD[k]:0;}); rl(); }

function mrow(v) {
  var r=rest(v), t=caV(v), s=solV(v);
  var pct=Math.min(100,Math.round((1-r/v.pl)*100));
  var bc=pct>90?"#e74c3c":pct>70?"#e67e22":"#27ae60";
  var act=v.cl.filter(function(c){return !c.an;}).length;
  var ann=v.cl.filter(function(c){return c.an;}).length;
  var h="<tr onclick=\"od("+v.id+")\">";
  h+="<td><strong style=\"color:#1a3a5c\">"+v.nom+"</strong></td>";
  h+="<td>"+typeBadge(v.type)+"</td>";
  h+="<td>"+sn(v.date)+"</td><td>"+sn(v.dr)+"</td>";
  h+="<td><div style=\"display:flex;align-items:center;gap:4px\"><div class=\"bw\"><div class=\"bf\" style=\"width:"+pct+"%;background:"+bc+"\"></div></div>";
  h+="<span style=\"color:"+(r<5?"#e74c3c":"#333")+"\">"+r+"/"+v.pl+"</span></div></td>";
  h+="<td class=\"nc\">"+(v.ch||"&mdash;")+"</td>";
  h+="<td class=\"nc\">"+act+(ann?" <span style=\"color:#e74c3c;font-size:10px\">(+"+ann+")</span>":"")+"</td>";
  h+="<td class=\"nr\">"+(t?fm(t):"&mdash;")+"</td>";
  h+="<td class=\"nr\" style=\"font-weight:600;color:"+(s>0?"#c0392b":"#27ae60")+"\">"+(t?fm(s):"&mdash;")+"</td>";
  h+="<td class=\"nr\" style=\"color:#888\">"+(v.mg?fm(v.mg):"&mdash;")+"</td>";
  h+="<td><span class=\"bx\" style=\"background:"+RB[v.sr]+";color:"+RC[v.sr]+";font-size:9px\">"+RL[v.sr]+"</span></td>";
  h+="</tr>";
  return h;
}

function rl() {
  var f=VY.filter(function(v){
    if(FT!=="all"&&v.type!==FT) return false;
    if(ST&&v.nom.toLowerCase().indexOf(ST.toLowerCase())<0) return false;
    return true;
  });
  var ts=VY.reduce(function(s,v){return s+solV(v);},0);
  var tc=VY.reduce(function(s,v){return s+v.cl.filter(function(c){return !c.an;}).length;},0);
  document.getElementById("hi").textContent=VY.length+" voyages \xb7 "+tc+" clients \xb7 Soldes: "+fm(ts);

  var grp={}, gk=[];
  f.forEach(function(v){
    var k=v.date?v.date.substring(0,7):"9999-99";
    if(!grp[k]){grp[k]=[];gk.push(k);}
    grp[k].push(v);
  });
  gk.sort();

  var html="";
  gk.forEach(function(k){
    var lst=grp[k], open=!COLL[k];
    var p=k.split("-");
    var lbl=(k==="9999-99")?"Sans date":(MO[parseInt(p[1])-1]+" "+p[0]);
    var tC=lst.reduce(function(s,v){return s+caV(v);},0);
    var tS=lst.reduce(function(s,v){return s+solV(v);},0);
    var tP=lst.reduce(function(s,v){return s+v.cl.filter(function(c){return !c.an;}).length;},0);
    html+="<div class=\"mw\">";
    html+="<div class=\"mband\" onclick=\"tog('"+k+"')\">";
    html+="<span>"+(open?"&#9660; ":"&#9654; ")+"&#128197; "+lbl+"</span>";
    html+="<span class=\"msub\">"+lst.length+" voyage"+(lst.length>1?"s":"")+" \xb7 "+tP+" clients \xb7 Soldes: "+fm(tS)+"</span>";
    html+="</div>";
    if(open){
      html+="<div style=\"overflow-x:auto\"><table class=\"voy\"><thead><tr>";

    var staffList2=v.staff||[];
    var staffDetail=staffList2.length
      ? staffList2.map(function(s){return (s.role==='chauffeur'?'🚌':'👤')+' '+sn(s.nm)+(s.lc?' ('+s.lc+')':'');}).join(' · ')
      : (v.ch_nb||1)+' chauf. + '+(v.acc_nb||1)+' acc.';
    out+="<div class=\"stat\" style=\"cursor:pointer;max-width:260px\" onclick=\"editStaff("+v.id+")\" title=\"Cliquer pour modifier\">";

    out+="<div class=\"stv\" style=\"font-size:10px;white-space:normal;line-height:1.4\">"+staffDetail+"</div></div>";
  }

  // Recap chambres pour sejour (utile pour Booking)
  if(sej){
    var chCount={S:0,D:0,TW:0,TR:0,Q:0};
    var chPers={S:0,D:0,TW:0,TR:0,Q:0};
    act.forEach(function(c){
      var cb=c.cb||'D';
      if(!chCount[cb]) chCount[cb]=0;
      if(!chPers[cb]) chPers[cb]=0;
      chCount[cb]+=(c.nc_ch||(c.cb==="S"?((c.a1||0)):c.cb==="TR"?Math.ceil((c.a3||0)/3):c.cb==="Q"?Math.ceil((c.a4||0)/4):Math.ceil(((c.a2||0))/2))||1);
      chPers[cb]+=tp(c);
    });
    // Chambres staff (avec chambre attribuée)
    var staffCh={S:0,D:0,TW:0,TR:0,Q:0};
    (v.staff||[]).forEach(function(s){
      if(s.ch&&staffCh[s.ch]!==undefined) staffCh[s.ch]++;
    });
    // Chambres accompagnateurs manuelles (legacy)
    var accCh=v.acc_ch||{S:0,D:0,TW:0,TR:0,Q:0};
    var chTypes=['S','D','TW','TR','Q'];
    var hasAny=chTypes.some(function(t){return chCount[t]>0||accCh[t]>0||staffCh[t]>0;});

      out+='<div style="margin:10px 0;padding:12px 16px;background:#fff;border:1.5px solid #1a3a5c;border-radius:8px">';

      chTypes.forEach(function(t){

          +'</div>';
      });
      var totCh=chTypes.reduce(function(s,t){return s+(chCount[t]||0)+(accCh[t]||0)+(staffCh[t]||0);},0);
      var totPers=chTypes.reduce(function(s,t){return s+(chPers[t]||0);},0);

        +'<div style="font-size:11px;color:rgba(255,255,255,.8)">chambres</div>'
        +'<div style="font-size:10px;color:rgba(255,255,255,.6)">'+totPers+' pers.</div>'
        +'</div>';
      out+='</div></div>';

  out+="<div class=\"stat\"><div class=\"stl\">CA total</div><div class=\"stv\">"+fm(t)+"</div></div>";
  out+="<div class=\"stat\"><div class=\"stl\">Encaisse</div><div class=\"stv\" style=\"color:#27ae60\">"+fm(rc2)+"</div></div>";
  out+="<div class=\"stat\"><div class=\"stl\">Soldes</div><div class=\"stv\" style=\"color:"+(s>0?"#c0392b":"#27ae60")+"\">"+fm(s)+"</div></div>";
  if(v.mg) out+="<div class=\"stat\"><div class=\"stl\">Marge</div><div class=\"stv\" style=\"font-size:14px\">"+fm(v.mg)+"</div></div>";
  out+="</div></div>";
  out+="<div class=\"sec\">Rooming</div>"+rb;
  out+=lxh+pi+hh;
  out+="<div class=\"sec\">Clients ("+act.length+")"+(ann.length?" &mdash; Annules: "+ann.length:"")+"</div>";
  out+="<div style=\"overflow-x:auto\"><table class=\"cl\"><thead>"+th+"</thead><tbody>"+tb+"</tbody>";

  // Totaux sejour
  if(sej){
    var tAD=act.reduce(function(s,c){return s+(c.a1||0)+(c.a2||0)+(c.a3||0)+(c.a4||0);},0);
    var tENF=act.reduce(function(s,c){return s+(c.en||0);},0);
    var tBB=act.reduce(function(s,c){return s+(c.bb||0);},0);
    var tTot=act.reduce(function(s,c){return s+tp(c);},0);
    var chTot={S:0,D:0,TW:0,TR:0,Q:0};
    act.forEach(function(c){var cb=c.cb||"D";var nb=c.nc_ch||(cb==="S"?(c.a1||0):cb==="TR"?Math.ceil((c.a3||0)/3):cb==="Q"?Math.ceil((c.a4||0)/4):Math.ceil((c.a2||0)/2))||1;if(chTot[cb]!==undefined)chTot[cb]+=nb;});
    // Staff rows — après le tableau clients, avant les totaux
    if((v.ch_nb||0)+(v.acc_nb||0)>0){
      var staffList=v.staff||[];

          out+="<tr style=\"background:#f0f4ff;font-style:italic;font-size:11px\" onclick=\"editStaff("+v.id+")\" title=\"Cliquer pour modifier\">";

          out+="<td></td>"; // Ref BB
          out+="<td style=\"color:#1a3a5c;font-weight:600\">"+sn(s.nm)+"</td>";
          out+="<td></td><td></td>"; // Mail, Tel
          out+="<td></td><td></td>"; // Lieu, Horaire
          out+="<td class=\"nc\" style=\"color:#1a3a5c\">1</td>"; // AD
          out+="<td></td><td></td>"; // ENF, BB
          out+="<td class=\"nc\" style=\"color:#1a3a5c\">1</td>"; // Tot
          // Chambres: marquer le type si attribué
          var sch=s.ch||'';
          out+="<td class=\"nc\">"+(sch==='S'?'1':'')+"</td>"; // S
          out+="<td class=\"nc\">"+(sch==='D'?'1':'')+"</td>"; // D
          out+="<td class=\"nc\">"+(sch==='TW'?'1':'')+"</td>"; // TW
          out+="<td class=\"nc\">"+(sch==='TR'?'1':'')+"</td>"; // TR
          out+="<td class=\"nc\">"+(sch==='Q'?'1':'')+"</td>"; // Q
          out+="<td colspan=\"9\"></td></tr>"; // Pension, Frais, Red, Prix, Recu, Solde, Fact, Date, Marge
        });
      } else {
        // Rétrocompat: juste le nombre
        out+="<tr style=\"background:#f0f4ff;font-style:italic;font-size:11px\" onclick=\"editStaff("+v.id+")\" title=\"Cliquer pour modifier\">";
        out+="<td colspan=\"3\" style=\"color:#666;padding:4px 8px\">&#x1F46E; Staff</td>";

        out+="<td class=\"nc\" style=\"color:#1a3a5c\">"+((v.ch_nb||0)+(v.acc_nb||0))+"</td>";
        out+="<td colspan=\"17\"></td></tr>";
      }
    }
    out+="<tfoot><tr>";
    out+="<td colspan=\"8\" style=\"text-align:right;font-weight:700\">TOTAUX</td>";
    out+="<td class=\"nc\" style=\"font-weight:700\">"+(tAD||"")+"</td>";
    out+="<td class=\"nc\">"+(tENF||"")+"</td>";
    out+="<td class=\"nc\">"+(tBB||"")+"</td>";
    out+="<td class=\"nc\" style=\"font-weight:700\">"+(tTot||"")+"</td>";
    out+="<td class=\"nc\">"+(chTot.S||"")+"</td><td class=\"nc\">"+(chTot.D||"")+"</td><td class=\"nc\">"+(chTot.TW||"")+"</td><td class=\"nc\">"+(chTot.TR||"")+"</td><td class=\"nc\">"+(chTot.Q||"")+"</td>";
    out+="<td></td>";
    out+="<td class=\"nr\">"+fm(tfr)+"</td><td class=\"nr\">"+fm(trd)+"</td>";
    out+="<td class=\"nr\" style=\"font-weight:700\">"+fm(t)+"</td>";
    out+="<td class=\"nr\" style=\"color:#27ae60;font-weight:700\">"+fm(rc2)+"</td>";
    out+="<td class=\"nr\" style=\"color:"+(s>0?"#c0392b":"#27ae60")+";font-weight:700\">"+fm(s)+"</td>";
    out+="<td colspan=\"3\"></td></tr></tfoot></table></div></div>";
  } else {
    out+="<tfoot><tr><td colspan=\"6\" style=\"text-align:right;font-weight:700\">TOTAUX</td><td colspan=\"6\"></td>";
    out+="<td class=\"nr\">"+fm(tfr)+"</td><td class=\"nr\">"+fm(trd)+"</td>";
    out+="<td class=\"nr\" style=\"font-weight:700\">"+fm(t)+"</td>";

}

// Dropdown lieu: auto-remplir horaire + afficher/cacher champ "Autre"
function lcChanged(sel, vid){
  var val=sel.value;
  var autreWrap=document.getElementById('elc_autre_wrap');
  var horaire=document.getElementById('ecc');
  if(val==='__autre__'){
    if(autreWrap) autreWrap.style.display='flex';
    if(horaire) horaire.value='';
    return;
  }
  if(autreWrap) autreWrap.style.display='none';
  var v=VY.find(function(x){return x.id==vid;});
  if(v&&v.lx&&horaire){
    var lx=v.lx.find(function(x){return x.l===val;});
    if(lx&&lx.h) horaire.value=lx.h;
    else horaire.value='';
  }
}

function saveE(vid,cid){
  var v=VY.find(function(x){return x.id==vid;});
  var c=v.cl.find(function(x){return x.id==cid;});
  if(!c)return;
  var vt=v.type;
  // Infos communes
  c.nc=gv("eno"); c.nm=(gv("enm")||"").toUpperCase(); c.pr=gv("epr");
  c.ml=gv("ema"); c.tl=gv("ete");
  // Voiture (disney_sejour)
  var evoit=document.getElementById('evoit');
  c.voit=evoit?evoit.checked:false;
  // Lieu / horaire (seulement si pas voiture)
  if(!c.voit){
    var _selLc=gv("elc");
    if(_selLc==='__autre__') _selLc=gv("elc_autre")||'';
    c.lc=_selLc; c.ho=gv("ecc");
  }
  // Hébergement
  if(isSejour(v)){
    c.rb=gv("erb");
    if(vt==='disney_sejour'){
      c.hotel=gv("ech");
      var pdj=document.getElementById('ep_pdj'); c.pdj=pdj?pdj.checked:false;
      var dp_=document.getElementById('ep_dp'); c.dp_=dp_?dp_.checked:false;
      var pc=document.getElementById('ep_pc'); c.pc=pc?pc.checked:false;
    } else {
      c.ps=gv("ecp");
    }
    // Chambres (rooms dynamiques)
    var rooms=saveRooms('editc');
    if(rooms.length) c.rooms=rooms;
    c.cb=(rooms.length?rooms[0].t:'')||'';
    c.nc_ch=rooms.length||1;
  }
  // Participants selon type
  if(vt==='1jour'){
    c.a1p=+(gv("ea1")||0); c.e1p=+(gv("ee1")||0); c.bb=+(gv("ebb")||0); c.bts=+(gv("ebts")||0);
    c.a1=0;c.a2=0;c.en=0;
  } else if(vt==='1jour_disney'){
    c.a1p=+(gv("ea1")||0); c.e1p=+(gv("ee1")||0);
    c.a2p=+(gv("ea2")||0); c.e2p=+(gv("ee2")||0);
    c.bts=+(gv("ebts")||0);
  } else if(vt==='sejour'){
    var _ad=+(gv("ea1")||0);
    var _rooms=c.rooms||[];
    c.a1=0;c.a2=0;c.a3=0;c.a4=0;
    if(c.cb==='S') c.a1=_ad;
    else if(c.cb==='TR') c.a3=_ad;
    else if(c.cb==='Q') c.a4=_ad;
    else c.a2=_ad;
    c.en=+(gv("ee1")||0); c.bb=+(gv("ebb")||0);
  } else if(vt==='disney_sejour'){
    var _ad2=+(gv("ea1")||0);
    c.a2=_ad2; c.a1=0;c.a3=0;c.a4=0;
    c.en=+(gv("ee1")||0); c.bts=+(gv("ebts")||0);
  } else if(vt==='grand_voyage'){
    c.a2=+(gv("ea1")||0);  // adultes double
    c.a1=+(gv("eas")||0);  // adultes single
    c.en=+(gv("ee1")||0);
    c.ac=+(gv("eac")||0);
    var gfEl=document.getElementById('egf'); c.gf=gfEl?gfEl.checked:false;
  }
  c.tot=tpAll(c);
  c.px=pf(gv("epx")); c.rc=pf(gv("erc")); c.fr=pf(gv("efr")); c.rd=pf(gv("erd"));
  c.fa=gv("efa"); c.dp=gv("edp");
  autoSave();
  cm(); rd();
}

function asgSeats(act, nb, v){
  // Si assignation manuelle existe pour ce voyage, l'utiliser
  var vid = _CAR_VID || 0;
  if(vid && _CAR_MANUAL[vid]){
    return _CAR_MANUAL[vid];
  }

  var isVolAvion=(v && (v.type==='grand_voyage'||v.type==='disney_sejour'));

  var ps=[];
  act.forEach(function(c){
    var n=tp(c), pr=dp(c.nm);
    // Pour les voyages avion: si pas de lieu de prise en charge → client va à l'aéroport seul → pas dans le car
    if(isVolAvion && !c.lc && !c.voit) return;
    var isSingleSeul=(c.cb==='S' && n===1);
    for(var i=0;i<n;i++) ps.push({nm:c.nm,lc:c.lc,ho:c.ho,nc:c.nc,pr:pr,hotel:c.hotel||'',singleSeul:isSingleSeul});
  });

  var used={}, asgn={};

  var ORDER_EVEN = [
    19,20,18,17, 25,26,28,27,
    15,16,14,13, 29,30,32,31,
    11,12,10,9,  33,34,36,35,
    7,8,6,5,     37,38,40,39,
    41,42,44,43, 3,4,2,1,
    45,46,47,48,49,
    24,23,22,21
  ].filter(function(s){return s<=nb;});

  var Z_AVANT  = [3,4,2,1,7,8,6,5];
  var Z_WC     = [22,21,24,23];
  var Z_FOND   = [45,46,47,48,49,41,42,44,43,37,38,40,39];
  var Z_MILIEU = [19,20,18,17,25,26,28,27,15,16,14,13,29,30,32,31];

  // Paires de sièges côte à côte (gauche/droite par rangée)
  // Dans le car: rangées de 4 sièges — paires: (4n-3,4n-2) et (4n-1,4n)
  // Sièges 1-2, 3-4, 5-6, 7-8... 41-42, 43-44 + banquette 45-49
  function partner(s){
    if(s>=45) return null; // banquette: pas de partenaire fixe
    return (s%2===1) ? s+1 : s-1;
  }

  var av=[], wc=[], fo=[], mi=[], no=[], singles=[];
  ps.forEach(function(p){
    if(p.singleSeul) singles.push(p);
    else if(p.pr==='avant') av.push(p);
    else if(p.pr==='wc') wc.push(p);
    else if(p.pr==='fond') fo.push(p);
    else if(p.pr==='milieu') mi.push(p);
    else no.push(p);
  });
  no.sort(function(a,b){
    var h=(a.ho||'').localeCompare(b.ho||'');
    return h||(a.lc||'').localeCompare(b.lc||'');
  });
  singles.sort(function(a,b){
    return (a.lc||'').localeCompare(b.lc||'');
  });

  function asg(pp, preferred){
    var seen={}, list=[];
    (preferred||[]).forEach(function(s){if(!seen[s]&&s<=nb){seen[s]=true;list.push(s);}});
    ORDER_EVEN.forEach(function(s){if(!seen[s]&&s<=nb){seen[s]=true;list.push(s);}});
    var avail=list.filter(function(s){return !used[s];});
    pp.forEach(function(p){
      var s=avail.shift();
      if(s){asgn[s]={nm:p.nm,lc:p.lc,ho:p.ho,nc:p.nc,hotel:p.hotel||''};used[s]=true;}
    });
  }

  // Placer les Singles seuls: priorité banquette (sièges 45-49) puis siège isolé
  // La banquette permet d'être vraiment seul sans bloquer un autre siège
  var Z_BANQUETTE = [45,46,47,48,49].filter(function(s){return s<=nb;});

  function asgSingles(pp){
    pp.forEach(function(p){
      var chosen=null;
      // 1. Priorité: siège libre sur la banquette
      for(var b=0;b<Z_BANQUETTE.length;b++){
        var sb=Z_BANQUETTE[b];
        if(!used[sb]){chosen=sb; break;}
      }
      // 2. Sinon: siège dont le partenaire est libre (on peut isoler)
      if(chosen===null){
        for(var i=0;i<ORDER_EVEN.length;i++){
          var s=ORDER_EVEN[i];
          if(used[s]) continue;
          var pt=partner(s);
          if(!pt || !used[pt]){chosen=s; break;}
        }
      }
      // 3. Dernier recours: n'importe quel siège libre
      if(chosen===null){
        for(var j=0;j<ORDER_EVEN.length;j++){if(!used[ORDER_EVEN[j]]){chosen=ORDER_EVEN[j];break;}}
      }
      if(chosen){
        asgn[chosen]={nm:p.nm,lc:p.lc,ho:p.ho,nc:p.nc,hotel:p.hotel||''};
        used[chosen]=true;
        // Si pas sur banquette: bloquer le siège partenaire temporairement
        if(Z_BANQUETTE.indexOf(chosen)<0){
          var pt2=partner(chosen);
          if(pt2&&!used[pt2]) used[pt2]='__single_block__';
        }
      }
    });
    // Libérer les blocages
    Object.keys(used).forEach(function(s){if(used[s]==='__single_block__') delete used[s];});
  }

  asg(av, Z_AVANT);
  asg(wc, Z_WC);
  asg(fo, Z_FOND);
  asg(mi, Z_MILIEU);
  asg(no, null);
  asgSingles(singles);  // Singles seuls placés après, avec isolation
  return asgn;
}

var LIEU_COLORS={
  goss:{bg:'#FFFDE7',bd:'#FDD835',tx:'#827717'},
  chap:{bg:'#FFF3E0',bd:'#FF9800',tx:'#E65100'},
  ll:  {bg:'#E3F2FD',bd:'#2196F3',tx:'#0D47A1'},
  nimy:{bg:'#E8F5E9',bd:'#4CAF50',tx:'#1B5E20'},

function getCol(l){
  l=(l||'').toLowerCase();
  if(l.indexOf('goss')>=0) return LIEU_COLORS.goss;
  if(l.indexOf('chap')>=0) return LIEU_COLORS.chap;
  if(l.indexOf('ll')>=0||l.indexOf('louv')>=0) return LIEU_COLORS.ll;
  if(l.indexOf('nimy')>=0) return LIEU_COLORS.nimy;
  if(l.indexOf('ghis')>=0||l.indexOf('sg')>=0) return LIEU_COLORS.sg;
  if(l.indexOf('gembl')>=0) return LIEU_COLORS.gemb;
  return LIEU_COLORS.autre;
}

function hotelAbbr(ht){
  ht=(ht||'').toUpperCase();
  if(ht.indexOf('DISNEY')>=0) return 'DH';
  if(ht.indexOf('NEW YORK')>=0||ht.indexOf('MARVEL')>=0) return 'NY';
  if(ht.indexOf('CHEYENNE')>=0) return 'CH';
  if(ht.indexOf('SANTA')>=0) return 'SF';
  if(ht.indexOf('SEQUOIA')>=0) return 'SL';
  if(ht.indexOf('NEWPORT')>=0) return 'NP';
  return '';
}

  var current=asgn[n]; // {nm, lc, ho, nc, hotel, _pid} _pid = "cid_idx"

  // Construire liste: 1 entree par personne de chaque reservation
  var opts='<option value="">-- Vide --</option>';

      var pid=c.id+'_'+i;

        +' - '+c.lc+(c.hotel?' ['+hotelAbbr(c.hotel)+']':'');
      var sel=(current&&current._pid===pid)?' selected':'';
      opts+='<option value="'+pid+'"'+sel+'>'+lbl+'</option>';
    }
  });

  var curLbl=current?(current.nm+(current._pid?' ('+current._pid.split('_')[1]+')':'')):'Libre';
  var html='<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);'
    +'background:#fff;border-radius:10px;padding:20px;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.3);width:360px">'
    +'<div style="font-weight:700;font-size:14px;color:#1a3a5c;margin-bottom:4px">Siege '+n+'</div>'
    +'<div style="font-size:11px;color:#888;margin-bottom:12px">Occupe par: '+curLbl+'</div>'
    +'<select id="seat_sel_'+n+'" style="width:100%;padding:8px;border:1px solid #dde;border-radius:6px;font-size:12px;margin-bottom:12px">'+opts+'</select>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button class="btn" onclick="closeSeatSel()">Annuler</button>'
    +'<button class="btn bp" onclick="assignSeat('+n+')">OK</button>'
    +'</div></div>'

function assignSeat(n){
  var vid=_CAR_VID;
  var act=_CAR_ACT;
  var sel=document.getElementById('seat_sel_'+n);
  if(!sel) return;
  var pid=sel.value; // "cid_idx" ou ""

  // Init manual: copier l assignation auto si pas encore faite
  if(!_CAR_MANUAL[vid]){
    var auto=asgSeats(act,_CAR_NB,VY.find(function(x){return x.id==vid;}));
    _CAR_MANUAL[vid]={};
    Object.keys(auto).forEach(function(s){
      _CAR_MANUAL[vid][parseInt(s)]=auto[s];
    });
    // Ajouter _pid a chaque entree auto
    // On reconstruit les pids: pour chaque client, ses pids dans l ordre des sieges
    act.forEach(function(c){
      var n2=tp(c);
      var cseats=Object.keys(_CAR_MANUAL[vid]).filter(function(s){
        return _CAR_MANUAL[vid][s]&&_CAR_MANUAL[vid][s].nc===c.nc;
      }).map(Number).sort(function(a,b){return a-b;});
      cseats.forEach(function(s,i){
        _CAR_MANUAL[vid][s]._pid=c.id+'_'+i;
      });
    });
  }

  if(!pid){
    // Vider ce siege uniquement
    delete _CAR_MANUAL[vid][n];
  } else {
    // Trouver si ce pid est deja place ailleurs -> liberer ce siege
    Object.keys(_CAR_MANUAL[vid]).forEach(function(s){
      if(_CAR_MANUAL[vid][s]&&_CAR_MANUAL[vid][s]._pid===pid){
        delete _CAR_MANUAL[vid][parseInt(s)];
      }
    });
    // Trouver le client
    var parts=pid.split('_');
    var cid=parseInt(parts[0]);
    var c=act.find(function(x){return x.id===cid;});
    if(c){
      _CAR_MANUAL[vid][n]={nm:c.nm,lc:c.lc,ho:c.ho,nc:c.nc,hotel:c.hotel||'',_pid:pid};
    }
  }
  closeSeatSel();
  planCar(vid);
}


function resetCarPlan(vid){
  if(_CAR_MANUAL[vid]) delete _CAR_MANUAL[vid];
  planCar(vid);
}

var _roomState = {}; // {prefix: [{t,n},...]}

function initRoomState(prefix, rooms){
  _roomState[prefix] = JSON.parse(JSON.stringify(rooms));
  refreshRoomPicker(prefix);
}

function refreshRoomPicker(prefix){
  var el = document.getElementById(prefix+'_rooms');
  if(!el) return;
  var rooms = _roomState[prefix]||[];
  var types=['S','D','TW','TR','Q'];
  var html='';
  rooms.forEach(function(r,i){
    html+='<div style="display:flex;align-items:center;gap:4px;background:#EBF5FB;border:1px solid #2196F3;border-radius:6px;padding:4px 8px">';
    html+='<input type="number" id="'+prefix+'_rn_'+i+'" value="'+r.n+'" min="1" onchange="_roomState[\''+prefix+'\']['+i+'].n=+(this.value||1)" style="width:36px;text-align:center;border:1px solid #dde;border-radius:4px;padding:2px">';
    html+='<select id="'+prefix+'_rt_'+i+'" onchange="_roomState[\''+prefix+'\']['+i+'].t=this.value" style="border:1px solid #dde;border-radius:4px;padding:2px">';
    types.forEach(function(t){html+='<option'+(r.t===t?' selected':'')+'>'+t+'</option>';});
    html+='</select>';
    if(rooms.length>1) html+='<button onclick="removeRoom(\''+prefix+'\','+i+')" style="background:#e74c3c;color:#fff;border:none;border-radius:3px;padding:1px 5px;cursor:pointer;font-size:11px">&times;</button>';
    html+='</div>';
  });
  el.innerHTML=html;
}

function addRoom(prefix){
  if(!_roomState[prefix]) _roomState[prefix]=[];
  _roomState[prefix].push({t:'D',n:1});
  refreshRoomPicker(prefix);
}

function removeRoom(prefix,i){
  if(!_roomState[prefix]||_roomState[prefix].length<=1) return;
  _roomState[prefix].splice(i,1);
  refreshRoomPicker(prefix);
}

function getRoomStateFromDOM(prefix){
  // Read current values from DOM inputs
  var rooms = _roomState[prefix]||[];
  rooms.forEach(function(r,i){
    var nEl=document.getElementById(prefix+'_rn_'+i);
    var tEl=document.getElementById(prefix+'_rt_'+i);
    if(nEl) r.n=+(nEl.value||1);
    if(tEl) r.t=tEl.value;
  });
  return rooms;
}

// Transport Disney: 80€/pers pour 2j, 100€/pers pour 3j+
function disneyTransport(nbNuits, nbPers){
  return (nbNuits >= 2 ? 100 : 80) * nbPers;
}

// Calcul automatique prix Disney contrat
// hotel = nom hotel, pension = 'PDJ'|'DP'|'PC'|'sans'
// nbA = nb adultes, nbE = nb enfants, nbNuits = nb nuits, transport = 'car'|'voiture'
function calcDisneyPrix(hotel, pension, hotelPrix, nbA, nbE, nbNuits, transport){
  var repasA = 0, repasE = 0;
  var tab = pension==='PDJ' ? DISNEY_PDJ : pension==='DP' ? DISNEY_DP : pension==='PC' ? DISNEY_PC : null;
  if(tab && tab[hotel]){
    repasA = tab[hotel].a * nbNuits;
    repasE = tab[hotel].e * nbNuits;
  }
  var baseHotel = hotelPrix || 0; // prix hotel saisi manuellement (contrat ou B2B)
  var repas = repasA * nbA + repasE * nbE;
  var trans = (transport === 'car') ? (nbNuits >= 2 ? 100 : 80) * (nbA + nbE) : 0;
  return baseHotel + repas + trans;
}



function toggleDisneyTransportSeul(vid){

function calcDisneyAC(vid){
  var v = VY.find(function(x){return x.id==vid;});
  if(!v) return;
  var hotel = gv('ach') || 'Santa Fe';
  var transport = gv('adis_tr') || 'car';
  var pension = gv('adis_ps') || 'sans';
  var ph = parseFloat(gv('adis_ph')||0);
  var nn = parseInt(gv('adis_nn')||1);
  var nbA = parseInt(gv('aa1')||0);
  var nbE = parseInt(gv('ae1')||0);

  var repasA = 0, repasE = 0;
  var tabR = pension==='PDJ' ? DISNEY_PDJ : pension==='DP' ? DISNEY_DP : pension==='PC' ? DISNEY_PC : null;
  if(tabR && tabR[hotel]){
    repasA = tabR[hotel].a * nn;
    repasE = tabR[hotel].e * nn;
  }
  var baseH = ph * (nbA + nbE);
  var repas = repasA * nbA + repasE * nbE;
  var trans = (transport==='car') ? ((nn>=2?100:80) * (nbA+nbE)) : 0;
  var total = baseH + repas + trans;

  var el = document.getElementById('adis_calc');
  var det = document.getElementById('adis_detail');
  if(el) el.textContent = total.toFixed(2)+' €';
  if(det){
    var parts = [];
    if(baseH) parts.push('hotel:'+baseH+'€');
    if(repas) parts.push('repas:'+repas+'€');
    if(trans) parts.push('transport:'+trans+'€');
    det.textContent = parts.length ? '('+parts.join(' + ')+')' : '';
  }
  var ep = document.getElementById('apx'); if(ep) ep.value = total.toFixed(2);
  var er = document.getElementById('arc'); if(er) er.value = total.toFixed(2);
}


function syncPaiements(vid){
  var v=VY.find(function(x){return x.id==vid;});
  if(!v||!v.cl||!v.cl.length){alert('Aucun client');return;}
  
  var clients = v.cl.filter(function(c){return !c.an && c.rb;});
  if(!clients.length){
    alert('Aucun client avec une référence PS (rb) — impossible de synchroniser.');
    return;
  }

  // Modal de progression
  document.getElementById('mod').innerHTML=
    '<div class="ov" id="ov"><div class="mo" style="width:480px">'
    +'<div class="mot">&#8635; Sync paiements PS</div>'
    +'<p style="font-size:12px;color:#666;margin-bottom:8px">Mise à jour des reçus depuis PrestaShop...</p>'
    +'<div id="sync_progress" style="background:#f0f0f0;border-radius:6px;height:8px;margin-bottom:8px">'
    +'<div id="sync_bar" style="background:#27ae60;height:8px;border-radius:6px;width:0%;transition:width .3s"></div>'
    +'</div>'
    +'<div id="sync_status" style="font-size:12px;color:#1a3a5c;margin-bottom:6px">Démarrage...</div>'
    +'<div id="sync_log" style="font-size:11px;max-height:180px;overflow-y:auto;background:#f8f9fc;border-radius:6px;padding:8px"></div>'
    +'<div class="mof" style="margin-top:12px"><button class="btn" id="sync_close" onclick="cm()" disabled>Fermer</button></div>'
    +'</div></div>';

  var done=0, updated=0, errors=0;
  var total=clients.length;

  function updateProgress(){
    var pct = Math.round(done/total*100);
    var bar=document.getElementById('sync_bar');
    var st=document.getElementById('sync_status');
    if(bar) bar.style.width=pct+'%';
    if(st) st.textContent=done+'/'+total+' clients traités — '+updated+' mis à jour';
  }

  function log(msg,color){
    var el=document.getElementById('sync_log');
    if(el){
      el.innerHTML+='<div style="color:'+(color||'#333')+'">'+msg+'</div>';
      el.scrollTop=el.scrollHeight;
    }
  }

  function syncNext(i){
    if(i>=total){
      // Terminé
      updateProgress();
      var st=document.getElementById('sync_status');
      if(st) st.textContent='✓ Terminé — '+updated+' reçu(s) mis à jour'+(errors?' · '+errors+' erreur(s)':'');
      var btn=document.getElementById('sync_close');
      if(btn) btn.disabled=false;
      autoSave();
      return;
    }
    var c=clients[i];
    // Utiliser la référence BB pour chercher les paiements
    fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=order_payments&filter[order_reference]='+c.rb+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
    .then(function(r){return r.json();})
    .then(function(pd){
      var recu=0;
      if(pd.order_payments&&pd.order_payments.length){
        pd.order_payments.forEach(function(p){recu+=parseFloat(p.amount||0);});
      }
      var oldRc=parseFloat(c.rc||0);
      if(Math.abs(recu-oldRc)>0.01){
        log('✓ '+c.nm+' '+(c.pr||'')+' : '+oldRc.toFixed(2)+'€ → <strong>'+recu.toFixed(2)+'€</strong>','#27ae60');
        c.rc=recu;
        updated++;
      } else {
        log('— '+c.nm+' '+(c.pr||'')+' : '+recu.toFixed(2)+'€ (inchangé)','#888');
      }
      done++;
      updateProgress();
      setTimeout(function(){syncNext(i+1);},150);
    })
    .catch(function(){
      log('✗ '+c.nm+' — erreur','#c0392b');
      errors++;done++;
      updateProgress();
      setTimeout(function(){syncNext(i+1);},150);
    });
  }

  syncNext(0);
}

// Calcul du prix attendu selon tarifs du voyage
function calcPxAttendu(v, c){
  var tx=v.tx||{};
  if(!tx||(!tx.D&&!tx.S&&!tx.A&&!tx.A1P&&!tx.GD)) return null;
  var vt=v.type;
  var px=0;
  if(vt==='1jour'){
    if(!tx.A&&!tx.E&&!tx.TS) return null;
    px+=(c.a1p||0)*(tx.A||0)+(c.e1p||c.en||0)*(tx.E||0)+(c.bts||0)*(tx.TS||0);
  } else if(vt==='1jour_disney'){
    if(!tx.A1P&&!tx.A2P) return null;
    px+=(c.a1p||0)*(tx.A1P||0)+(c.e1p||0)*(tx.E1P||0)
       +(c.a2p||0)*(tx.A2P||0)+(c.e2p||0)*(tx.E2P||0)
       +(c.bts||0)*(tx.BTS||0);
  } else if(vt==='sejour'){
    if(!tx.D&&!tx.S) return null;
    var rooms=getRooms(c);
    if(rooms.length){
      rooms.forEach(function(r){
        var t=(r.t||'D').toUpperCase();
        var nbP=r.p||0;
        px+=nbP*(t==='S'?tx.S:tx.D||0);
      });
    } else {
      var totAD=(c.a1||0)+(c.a2||0)+(c.a3||0)+(c.a4||0);
      px+=totAD*(c.cb==='S'?tx.S:tx.D||0);
    }
    px+=(c.en||0)*(tx.E||0);
  } else if(vt==='grand_voyage'){
    if(!tx.D&&!tx.S) return null;
    px+=(c.a2||0)*(tx.D||0)+(c.a1||0)*(tx.S||0)+(c.en||0)*(tx.E||0);
    if(c.gf) px+=(tpAll(c))*(tx.F||0);
    px+=(c.ac||0)*(tx.A||0);
  } else {
    return null; // disney_sejour: prix issu du contrat Disney, pas calculable ici
  }
  return Math.round(px*100)/100;
}

function prtCh(vid){
  var v=VY.find(function(x){return x.id==vid;});
  var isVol=(v.type==='grand_voyage'||v.type==='disney_sejour');
  var act=v.cl.filter(function(c){

    if(isVol&&!c.lc) return false; // va à l'aéroport seul
    return true;

  var staffMembers=(v.staff||[]).map(function(s){
    return {nm:(s.role==='chauffeur'?'🚌 ':'👤 ')+(s.nm||s.role),tl:'',nc:'STAFF',lc:s.lc||'',ho:'',_isStaff:true};
  });

    var h=(a.ho||'').localeCompare(b.ho||'');
    return h||(a.lc||'').localeCompare(b.lc||'');
  });
  var grp={},gk=[];
  allRows.forEach(function(c){
    var k=(c.ho||'?')+' - '+(c.lc||'?');

    grp[k].push(c);

    ll:  {bg:'#E3F2FD',bd:'#2196F3',tx:'#0D47A1'},  // bleu
    nimy:{bg:'#E8F5E9',bd:'#4CAF50',tx:'#1B5E20'},  // vert
    sg:  {bg:'#FFEBEE',bd:'#F44336',tx:'#B71C1C'},  // rouge

    l=(l||'').toLowerCase();

    if(l.indexOf('ll')>=0||l.indexOf('louv')>=0)return COLS.ll;

    var firstC=grpList[0];

      +'<td colspan="4" style="'
      +'background:'+col.bd+';'
      +'color:#fff;'

      + firstC.lc                    // juste le nom du lieu

      +'<span style="float:right;font-size:13px;font-weight:600">'

      +'</tr>';
    grpList.forEach(function(c,i){

function sAC(vid){
  var v=VY.find(function(x){return x.id==vid;});
  var vt=v.type;
  // Lieu / horaire
  var selLc=gv("ach")||gv("alc")||'';
  var fd=v.lx&&v.lx.find(function(x){return selLc===x.l;});
  var lc2=fd?fd.l:selLc, ho2=fd?(fd.h||gv("acc")):gv("acc");
  var voit=false;
  var evoit2=document.getElementById('avoit');
  if(evoit2) voit=evoit2.checked;

  var c={id:Date.now(),nc:gv("ano"),nm:(gv("anm")||"").toUpperCase(),pr:gv("apr"),
    ml:gv("ama"),tl:gv("ate"),
    lc:voit?'':lc2, ho:voit?'':ho2, voit:voit,
    rb:isSejour(v)?gv("arb"):"",
    hotel:'',cb:'',rooms:[],nc_ch:1,ps:'',
    a1:0,a2:0,a3:0,a4:0,en:0,bb:0,
    a1p:0,e1p:0,a2p:0,e2p:0,bts:0,ac:0,gf:false,
    px:pf(gv("apx")),rc:pf(gv("arc")),fr:pf(gv("afr")),rd:pf(gv("ard")),
    fa:gv("afa"),dp:gv("adp"),mg:0,an:0,parts:[]};

  if(vt==='1jour'){
    c.a1p=+(gv("aa1")||0); c.e1p=+(gv("ae1")||0); c.bb=+(gv("abb")||0); c.bts=+(gv("abts")||0);
  } else if(vt==='1jour_disney'){
    c.a1p=+(gv("aa1")||0); c.e1p=+(gv("ae1")||0);
    c.a2p=+(gv("aa2")||0); c.e2p=+(gv("ae2")||0);
    c.bts=+(gv("abts")||0);
  } else if(vt==='sejour'){
    var _rooms=getRoomStateFromDOM('oac');
    c.rooms=_rooms; c.cb=_rooms.length?(_rooms[0].t||'D'):'D'; c.nc_ch=_rooms.length||1; c.ps=gv("acp");
    var _ad=+(gv("aa1")||0);
    if(c.cb==='S') c.a1=_ad; else if(c.cb==='TR') c.a3=_ad; else if(c.cb==='Q') c.a4=_ad; else c.a2=_ad;
    c.en=+(gv("ae1")||0); c.bb=+(gv("abb")||0);
  } else if(vt==='disney_sejour'){
    var _rooms2=getRoomStateFromDOM('oac');
    c.rooms=_rooms2; c.cb=_rooms2.length?(_rooms2[0].t||'D'):'D'; c.nc_ch=_rooms2.length||1;
    c.hotel=gv("ach");
    var pdj2=document.getElementById('ap_pdj'); c.pdj=pdj2?pdj2.checked:false;
    var dp2=document.getElementById('ap_dp'); c.dp_=dp2?dp2.checked:false;
    var pc2=document.getElementById('ap_pc'); c.pc=pc2?pc2.checked:false;
    c.a2=+(gv("aa1")||0); c.en=+(gv("ae1")||0); c.bts=+(gv("abts")||0);
  } else if(vt==='grand_voyage'){
    var _rooms3=getRoomStateFromDOM('oac');
    c.rooms=_rooms3; c.cb=_rooms3.length?(_rooms3[0].t||'D'):'D'; c.nc_ch=_rooms3.length||1; c.ps=gv("acp");
    c.a2=+(gv("aa1")||0); c.a1=+(gv("aas")||0); c.en=+(gv("ae1")||0); c.ac=+(gv("aac")||0);
    var gfEl2=document.getElementById('agf'); c.gf=gfEl2?gfEl2.checked:false;
  }
  if(window._pendingParts&&window._pendingParts.length>0){c.parts=window._pendingParts;window._pendingParts=null;}
  c.tot=tpAll(c);
  v.cl.push(c);
  autoSave();
  cm(); rd();
}

function importPS(vid){
  var v = VY.find(function(x){return x.id==vid;});
  // Demander la reference PS si pas deja definie
  var ref = v.psref || '';
  // Construire la liste des produits PS disponibles
  var prodOpts = '<option value="">-- Choisir un produit PS --</option>';
  if(_PS_PRODUCTS.length){
    // Filtrer: seulement les vrais voyages (pas les frais/modifs)
    var voyages = _PS_PRODUCTS.filter(function(p){
      var n=(p.name&&p.name[0]?p.name[0].value:'').toLowerCase();
      return n.indexOf('frais')<0 && n.indexOf('modif')<0 
          && n.indexOf('difference')<0 && n.indexOf('ajout')<0
          && (p.reference||'').match(/^\d{6}$/);
    });
    voyages.sort(function(a,b){
      return (b.reference||'').localeCompare(a.reference||'');
    });
    voyages.forEach(function(p){
      var nom = p.name&&p.name[0]?p.name[0].value:'';
      var sel = (p.reference===ref)?' selected':'';
      prodOpts += '<option value="'+p.reference+'"'+sel+'>'+p.reference+' — '+nom+'</option>';
    });
  }

  var html = '<div class="ov" id="ov" onclick="cmo(event)"><div class="mo" style="width:520px">'
    +'<div class="mot">Importer depuis PrestaShop</div>'
    +(_PS_PRODUCTS.length
      ? '<div class="fg" style="margin-bottom:12px"><label>Choisir le voyage</label>'
        +'<select id="ps_prod_sel" onchange="var r=this.options[this.selectedIndex].value;document.getElementById(&quot;ps_ref&quot;).value=r;"'
        +'style="width:100%;padding:8px;font-size:12px;border:1px solid #dde;border-radius:6px">'+prodOpts+'</select></div>'
      : '<p style="font-size:11px;color:#e67e22;margin-bottom:8px">&#9888; Produits PS non charges - saisir manuellement</p>')
    +'<div class="fg" style="margin-bottom:12px"><label>Reference produit PS</label>'
    +'<input type="text" id="ps_ref" value="'+ref+'" placeholder="ex: 261014" style="font-size:13px;padding:8px"></div>'
    +'<div id="ps_status" style="font-size:12px;color:#666;min-height:20px;margin-bottom:8px"></div>'
    +'<div class="mof">'
    +'<button class="btn" onclick="cm()">Annuler</button>'
    +'<button class="btn bp" onclick="doImportPS('+vid+')">&#8659; Importer</button>'
    +'</div></div></div>';

function doImportPS(vid){
  var v = VY.find(function(x){return x.id==vid;});
  var ref = document.getElementById('ps_ref').value.trim();
  if(!ref){ alert('Entrez une reference PS'); return; }
  v.psref = ref;
  var status = document.getElementById('ps_status');
  status.textContent = 'Recherche du produit...';

  // Etape 1: Trouver le produit par reference
  fetch(PS_URL+'/products?filter[reference]='+ref+'&display=[id,name,reference]&output_format=JSON', {
    headers: {'Authorization': 'Basic '+btoa(PS_KEY+':')}
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var products = data.products;
    if(!products||!products.length){
      status.style.color='#c0392b';
      status.textContent = 'Aucun produit trouve avec la reference "'+ref+'"';
      return;
    }
    var pid = products[0].id;
    status.textContent = 'Produit trouve: '+products[0].name[0].value+' (ID: '+pid+') - Chargement des commandes...';
    return fetchPSOrders(vid, pid, ref, status);
  })
  .catch(function(e){
    status.style.color='#c0392b';
    status.textContent = 'Erreur de connexion: '+e.message;
  });
}

function fetchPSOrders(vid, pid, ref, status){
  var v = VY.find(function(x){return x.id==vid;});
  // Recuperer les commandes contenant ce produit
  return fetch(PS_URL+'/order_details?filter[product_id]='+pid+'&display=[id,id_order,product_name,product_quantity]&output_format=JSON', {
    headers: {'Authorization': 'Basic '+btoa(PS_KEY+':')}
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    var details = data.order_details || [];
    if(!details.length){
      status.style.color='#e67e22';
      status.textContent = 'Aucune commande trouvee pour ce produit.';
      return;
    }
    status.textContent = details.length+' ligne(s) de commande trouvees - Chargement des clients...';
    // Recuperer infos de chaque commande
    var orderIds = [...new Set(details.map(function(d){return d.id_order;}))];
    return Promise.all(orderIds.map(function(oid){
      return fetch(PS_URL+'/orders/'+oid+'?display=full&output_format=JSON', {
        headers: {'Authorization': 'Basic '+btoa(PS_KEY+':')}
      }).then(function(r){return r.json();});
    }))
    .then(function(orders){
      var imported = 0, skipped = 0;
      orders.forEach(function(data){
        var o = data.order;
        if(!o) return;
        // Verifier si client deja present (par nc)
        var nc = 'NS '+o.id;
        var existing = v.cl.find(function(c){return c.nc===nc;});
        if(existing){ skipped++; return; }
        // Quantite commandee
        var det = details.find(function(d){return d.id_order==o.id;});
        var qty = det ? parseInt(det.product_quantity) : 1;
        // Creer le client
        var c = {
          id: Date.now()+imported,
          nc: nc,
          nm: (o.lastname||'').toUpperCase()+' '+(o.firstname||''),
          ml: '',
          tl: '',
          lc: '', ho: '', hotel: '',
          tot: qty, an: 0,
          px: parseFloat(o.total_paid)||0,
          rc: parseFloat(o.total_paid)||0,
          fr: 0, rd: 0, fa: '', dp: '',
          parts: []
        };
        if(v.type==='1jour'){c.a1p=qty;}
        else{c.a2=qty;}
        v.cl.push(c);
        imported++;
      });
      status.style.color='#27ae60';
      status.textContent = imported+' client(s) importe(s), '+skipped+' deja present(s).';
      setTimeout(function(){ cm(); rd(); }, 1500);
    });
  });
}

function importPSNew(){
  var ref = document.getElementById('npsref').value.trim();
  var status = document.getElementById('ps_new_status');
  if(!ref){ status.textContent='Entrez un ID ou une reference PS'; return; }
  status.style.color='#666';
  status.textContent='Recherche...';

  // Essayer d abord par ID direct, sinon par reference
  var isId = /^\d+$/.test(ref);
  var url = isId
    ? 'https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=products/'+ref+'&display=full'
    : 'https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=products&filter[reference]='+encodeURIComponent(ref)+'&display=full';

  fetch(url, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY
    }
  })
  .then(function(r){return r.json();})
  .then(function(data){
    // Normaliser: product (objet) ou products (tableau)
    var p = data.product || (data.products && data.products[0]) || null;
    if(!p){
      status.style.color='#c0392b';
      status.textContent='Produit non trouve pour: '+ref;
      return;
    }
    // Nom du produit
    var nom = '';
    if(typeof p.name === 'string') nom = p.name;
    else if(p.name && p.name[0]) nom = p.name[0].value || p.name[0] || '';
    else if(Array.isArray(p.name)) nom = p.name[0] || '';

    // Mois en lettres -> numero
    var MOIS={'janvier':'01','fevrier':'02','f\u00e9vrier':'02','mars':'03','avril':'04',
      'mai':'05','juin':'06','juillet':'07','aout':'08','ao\u00fbt':'08',
      'septembre':'09','octobre':'10','novembre':'11','decembre':'12','d\u00e9cembre':'12'};
    var dateVal='', dateRet='';
    var nomL2 = nom.toLowerCase();
    // Format JJ/MM/AAAA
    var m1 = nom.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    // Format AAAA-MM-JJ
    var m2 = nom.match(/(\d{4})-(\d{2})-(\d{2})/);
    // Format "JJ au JJ mois AAAA"
    var m3 = nomL2.match(/(\d{1,2})\s+au\s+(\d{1,2})\s+(\w+)\s+(\d{4})/);
    if(m1){
      dateVal = m1[3]+'-'+m1[2]+'-'+m1[1];
    } else if(m2){
      dateVal = m2[0];
    } else if(m3){
      var mois = MOIS[m3[3]]||'01';
      dateVal = m3[4]+'-'+mois+'-'+(m3[1].length===1?'0':'')+m3[1];
      dateRet = m3[4]+'-'+mois+'-'+(m3[2].length===1?'0':'')+m3[2];
    } else {
      // Depuis reference AAMMJJ
      var r2 = (p.reference||'').match(/^(\d{2})(\d{2})(\d{2})$/);
      if(r2) dateVal='20'+r2[1]+'-'+r2[2]+'-'+r2[3];
    }

    // Type auto-detect amélioré
    var nomL = nom.toLowerCase();
    var autoType;
    if(/disney/i.test(nom)){
      // Disney: séjour si plusieurs jours, sinon 1jour
      var isMultiJ=/\b[2-9]\s*j\b|\bnuit\b|\bsejour\b/i.test(nom);
      autoType = isMultiJ ? 'disney_sejour' : '1jour_disney';
    } else if(/new york|canada|floride|wdw|californie|las vegas|japon|laponie|lisbonne|edimbourg|cracovie/i.test(nom)){
      autoType = 'grand_voyage';
    } else if(nomL.indexOf('sejour')>=0 || nomL.indexOf('nuit')>=0
      || /\b[2-9]\s*jours?\b/i.test(nom)
      || /\b\d{2}\s*(au|-)\s*\d{2}/i.test(nom)){
      autoType = 'sejour';
    } else {
      autoType = '1jour';
    }
    var type = autoType;

    // Remplir les champs
    document.getElementById('nn').value = nom;
    if(dateVal) document.getElementById('nd').value = dateVal;
    if(dateRet) { var dr=document.getElementById('ndr'); if(dr) dr.value=dateRet; }
    // Places
    if(p.quantity) {
      var plEl = document.getElementById('npl');
      if(plEl) plEl.value = parseInt(p.quantity)||48;
    }
    // Type
    var sel = document.getElementById('nt');
    for(var j=0;j<sel.options.length;j++)
      if(sel.options[j].value===type){ sel.selectedIndex=j; break; }

    // Mettre a jour le selecteur et afficher/cacher sections sejour
    toggleNVSejour();

    status.style.color='#27ae60';
    status.textContent='✓ '+nom+(p.quantity?' ('+p.quantity+' places)':'')
      +'. Completer et cliquer Créer.';
    // Mémoriser l'ID PS numérique dans le champ
    if(p.id) document.getElementById('npsref').value=p.id;
  })
  .catch(function(e){
    status.style.color='#c0392b';
    status.textContent='Erreur: '+e.message;
  });
}

function doImportExcel(){
  var mois = document.getElementById('xl_mois').value;
  var annee = document.getElementById('xl_annee').value;
  var status = document.getElementById('xl_status');
  var btn = document.getElementById('xl_btn');
  btn.disabled=true; btn.textContent='⏳ Lecture...';
  status.style.color='#1a3a5c';
  status.textContent='Lecture du fichier Excel...';

  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var wb = XLSX.read(e.target.result, {type:'array'});

      // Filtrer les onglets du mois/année choisis
      // Format des noms: "Voyage XX-MM-YY" ou "Voyage MM-YY" 
      var suffix2 = '-'+mois+'-'+annee.toString().slice(2); // ex: "-08-26"
      var suffix4 = '-'+mois+'-'+annee; // ex: "-08-2026"
      var matchSheets = wb.SheetNames.filter(function(n){
        return n.indexOf(suffix2)>=0 || n.indexOf(suffix4)>=0;
      });

      if(!matchSheets.length){
        status.style.color='#c0392b';
        status.textContent='Aucun onglet trouvé pour '+mois+'/'+annee+'. Vérifiez la période sélectionnée.';
        btn.disabled=false; btn.textContent='📥 Importer';
        return;
      }

      status.textContent='Trouvé '+matchSheets.length+' onglets — traitement...';

      // Parser chaque onglet
      var newVoyages = [];
      var errors = [];
      matchSheets.forEach(function(sheetName){
        try {
          var ws = wb.Sheets[sheetName];
          var v = parseExcelSheet(ws, sheetName, annee);
          if(v) newVoyages.push(v);
        } catch(err){
          errors.push(sheetName+': '+err.message);
        }
      });

      // Remplacer les voyages du même mois dans VY
      var keepVoyages = VY.filter(function(v){
        if(!v.date) return true;
        var d = v.date.substring(0,7); // "2026-08"
        return d !== annee+'-'+mois;
      });

      // Ajouter les nouveaux
      VY = keepVoyages.concat(newVoyages);
      VY.sort(function(a,b){ return (a.date||'').localeCompare(b.date||''); });

      autoSave();
      cm();
      rl();

      // Message final
      var msg = '✅ '+newVoyages.length+' voyages importés ('+newVoyages.reduce(function(s,v){return s+v.cl.length;},0)+' clients)';
      if(errors.length) msg += ' — '+errors.length+' erreur(s)';
      var el=document.getElementById('save_status');
      if(el){el.textContent=msg;el.style.color='rgba(255,255,255,.8)';}

    } catch(err){
      status.style.color='#c0392b';
      status.textContent='Erreur: '+err.message;
      btn.disabled=false; btn.textContent='📥 Importer';
    }
  };
  reader.readAsArrayBuffer(window._xlFile);
}

function parseExcelSheet(ws, sheetName, annee){
  // Convertir en tableau de tableaux
  var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(!rows.length) return null;

  var name = sheetName.trim();

  // Ignorer les onglets modèles et autres
  var ignorePatterns = ['model','modèle','modele','voyage 1 jour','voyage week','annulé','recap','feuil','pdf','b2b','chèque','paiement'];
  if(ignorePatterns.some(function(p){ return name.toLowerCase().indexOf(p)>=0; })) return null;

  // Détecter le type
  function detectType(n){
    var nl = n.toLowerCase();
    if((nl.indexOf('disney')>=0) && (nl.indexOf('multi')>=0 || nl.indexOf('2j')>=0 || nl.indexOf('3j')>=0 || nl.indexOf('4j')>=0 || nl.indexOf('5j')>=0 || nl.indexOf('2 j')>=0 || nl.indexOf('3 j')>=0)) return 'disney_sejour';
    if(nl.indexOf('disney')>=0) return '1jour_disney';
    if(/new york|canada|wdw|floride|las vegas|californie|édimbourg|edimbourg|lisbonne|cracovie|laponie|japon|espagne/.test(nl)) return 'grand_voyage';
    if(/\b[2-9]j\b|\b[2-9] j\b|nuit|séjour|sejour|week-end|3 jour|4 jour|5 jour/.test(nl)) return 'sejour';
    return '1jour';
  }

  var vtype = detectType(name);

  // Parser la date depuis le nom de l'onglet
  function parseDate(s){
    // Format JJ-MM-YY ou JJ-MM-YYYY
    var m = s.match(/(\d{2})-(\d{2})-(\d{2,4})$/);
    if(m){
      var yr = m[3].length===2 ? '20'+m[3] : m[3];
      return yr+'-'+m[2]+'-'+m[1];
    }
    return '';
  }
  var dateStr = parseDate(name);

  // Chercher date retour dans les données
  var dateRet = '';
  for(var ri=0;ri<Math.min(8,rows.length);ri++){
    for(var ci=0;ci<rows[ri].length;ci++){
      var cell = String(rows[ri][ci]).trim();
      // Numéro de série Excel
      if(/^\d{5}$/.test(cell)){
        var d = new Date(Math.round((parseInt(cell)-25569)*86400*1000));
        var ds = d.toISOString().substring(0,10);
        if(!dateStr) dateStr = ds;
        else if(!dateRet && ds !== dateStr) dateRet = ds;
      }
      // Format "JJ au JJ mois YYYY"
      var m2 = cell.match(/(\d{1,2})\s+au\s+(\d{1,2})\s+(\w+)\s+(\d{4})/i);
      if(m2){
        var MOIS={'jan':'01','fev':'02','fév':'02','mar':'03','avr':'04','mai':'05','jun':'06','jul':'07','aou':'08','aoû':'08','sep':'09','oct':'10','nov':'11','dec':'12','déc':'12'};
        var mo=MOIS[m2[3].substring(0,3).toLowerCase()]||'01';
        if(!dateStr) dateStr=m2[4]+'-'+mo+'-'+m2[1].padStart(2,'0');
        dateRet=m2[4]+'-'+mo+'-'+m2[2].padStart(2,'0');
      }
    }
  }

  // Trouver la ligne d'en-tête (contient "N° Cde" ou "NOM")
  var headerIdx = -1;
  for(var i=0;i<rows.length;i++){
    var row = rows[i].map(function(c){return String(c).toLowerCase().trim();});
    if(row.some(function(c){return c.indexOf('cde')>=0||c==='nom';})){
      headerIdx=i; break;
    }
  }
  if(headerIdx<0) return null;

  var headers = rows[headerIdx].map(function(c){return String(c).trim();});

  function hi(names){
    for(var ni=0;ni<names.length;ni++){
      for(var hi2=0;hi2<headers.length;hi2++){
        if(headers[hi2].toLowerCase().indexOf(names[ni].toLowerCase())>=0) return hi2;
      }
    }
    return -1;
  }

  var I = {
    nc: hi(['n° cde','n°cde','cde']),
    nm: hi(['nom']),
    ml: hi(['mail']),
    tl: hi(['telephone','tél']),
    lc: hi(['lieu de charge','lieu de charg','lieu charg']),
    ho: hi(['horaire']),
    px: hi(['prix total','prix']),
    rc: hi(['reçu','recu']),
    fa: hi(['n° fact','fact']),
    dp: hi(['date pay']),
    fr: hi(['frais']),
    rd: hi(['reduc','réduction']),
    mg: hi(['marge']),
    a1p: hi(['ad 1p','adulte 1']),
    e1p: hi(['enf 1p','enfant 1p']),
    a2p: hi(['ad 2p','adulte 2p']),
    e2p: hi(['enf 2p','enfant 2p']),
    bts: hi(['bb/ts','bébé','bebe']),
    ad:  hi(['nbre ad','adulte','ad']),
    enf: hi(['nbre enf','enfant','enf'])
  };

  // Colonnes chambres S D TW TR Q
  var CH={};
  ['S','D','TW','TR','Q'].forEach(function(t){
    for(var ci=0;ci<headers.length;ci++){
      if(headers[ci].trim()===t){CH[t]=ci;break;}
    }
  });

  // Lieux de chargement
  var lx=[];
  var inLx=false;
  for(var ri2=0;ri2<rows.length;ri2++){
    var row2=rows[ri2].map(function(c){return String(c).trim();});
    if(row2.some(function(c){return c.toLowerCase().indexOf('lieux')>=0&&c.toLowerCase().indexOf('charge')>=0;})){
      inLx=true; continue;
    }
    if(inLx){
      var nonempty=row2.filter(function(c){return c&&c!='#N/A';});
      if(nonempty.length>=2 && /\d+[hH]\d+/.test(nonempty[1])){
        var lieu=normaliseLieu(nonempty[0]);
        if(lieu&&!lx.some(function(x){return x.l===lieu;}))
          lx.push({l:lieu,h:nonempty[1]});
      } else if(!nonempty.length) inLx=false;
    }
  }

  // Tarifs
  var tx={};
  for(var ri3=0;ri3<Math.min(10,rows.length);ri3++){
    var row3=rows[ri3].map(function(c){return String(c).trim();});
    var rowStr=row3.join(' ').toLowerCase();
    for(var ci2=0;ci2<row3.length;ci2++){
      var c2=row3[ci2].toLowerCase();
      var v2=parseFloat(row3[ci2+1])||0;
      if(!v2) continue;
      if(c2.indexOf('adulte')>=0&&rowStr.indexOf('1 parc')>=0&&!tx.A1P) tx.A1P=v2;
      else if(c2.indexOf('enfant')>=0&&rowStr.indexOf('1 parc')>=0&&!tx.E1P) tx.E1P=v2;
      else if(c2.indexOf('adulte')>=0&&rowStr.indexOf('2 parc')>=0&&!tx.A2P) tx.A2P=v2;
      else if(c2.indexOf('enfant')>=0&&rowStr.indexOf('2 parc')>=0&&!tx.E2P) tx.E2P=v2;
      else if((c2==='bb/ts'||c2==='bébé'||c2==='bebe')&&!tx.BTS) tx.BTS=v2;
      else if(c2.indexOf('adulte')>=0&&!tx.A1P&&!tx.A) tx.A=v2;
      else if(c2.indexOf('enfant')>=0&&!tx.E1P&&!tx.E) tx.E=v2;
      else if(c2.indexOf('double')>=0&&!tx.D) tx.D=v2;
      else if(c2.indexOf('single')>=0&&!tx.S) tx.S=v2;
    }
  }

  // Parser les clients
  var clients=[];
  var vid2=Date.now()+Math.floor(Math.random()*10000);
  var cid2=1;
  var clientsDone=false; // flag: on a fini les clients

  function pf2(v3){
    try{ var n=parseFloat(String(v3).replace(',','.')); return isNaN(n)?0:Math.round(n*100)/100; }
    catch(e){ return 0; }
  }
  function gc2(row,idx){ return idx>=0&&idx<row.length?pf2(row[idx]):0; }
  function gs(row,idx){ return idx>=0&&idx<row.length?String(row[idx]).trim():''; }

  // Mots-clés qui signalent la fin des clients
  var STOP_KEYWORDS=['places dispo','pl restantes','lieux de charge','lieux de chargement',
    'etat de la rooming','pas de rooming','rooming faite','rooming envoy',
    'horaire','total général','total 5h','total 6h',
    'gomez','chauffeur','guide','accomp'];

  // Garder trace des N° de commande déjà vus pour détecter doublons annulation
  var seenNc={};
  var annulNc={};

  for(var ri4=headerIdx+1;ri4<rows.length&&!clientsDone;ri4++){
    var row4=rows[ri4];
    if(!row4||!row4.length) continue;

    var nc=gs(row4,I.nc);
    var nm=gs(row4,I.nm);
    var rowStr4=row4.map(function(c){return String(c).toLowerCase();}).join(' ');

    // Détecter fin du tableau clients
    if(STOP_KEYWORDS.some(function(k){return rowStr4.indexOf(k)>=0;})){
      clientsDone=true; break;
    }

    // Ignorer lignes sans N° cde valide (format NS XXXX ou chiffres)
    if(!nc || !/^(NS\s*\d+|\d+)$/i.test(nc.trim())) continue;
    // Ignorer lignes dont le NOM contient des mots-clés de configuration
    var nmLow=nm.toLowerCase();
    if(['lieux','chargement','rooming','horaire','total','places','chauffeur','gomez','guide','accomp','staff']
       .some(function(k){return nmLow.indexOf(k)>=0;})) continue;

    // Ignorer #N/A
    if(['#N/A','#REF!'].some(function(x){return nc.indexOf(x)>=0||nm.indexOf(x)>=0;})) continue;

    var px3=pf2(gc2(row4,I.px));
    var isAnn=px3<0;

    // Gérer doublons: dans l'Excel, une annulation = ligne positive + ligne négative avec même NC
    // On garde seulement la version annulée
    if(nc){
      if(isAnn){
        annulNc[nc]=true;
        // Supprimer la version positive si déjà ajoutée
        clients=clients.filter(function(c){return c.nc!==nc||c.an;});
      } else if(annulNc[nc]){
        continue; // Version positive d'un client annulé - ignorer
      }
    }

    var lcRaw=gs(row4,I.lc);
    var lcNorm=normaliseLieu(lcRaw);
    var hoVal=gs(row4,I.ho);
    if(!hoVal&&lcNorm){
      var lxItem=lx.find(function(x){return x.l===lcNorm;});
      if(lxItem) hoVal=lxItem.h;
    }

    var c3={
      id: vid2*1000+cid2,
      nc: nc, nm: nm.toUpperCase(),
      ml: gs(row4,I.ml), tl: gs(row4,I.tl),
      lc: lcNorm, ho: hoVal,
      px: Math.abs(px3),
      rc: Math.abs(gc2(row4,I.rc)),
      fr: Math.abs(gc2(row4,I.fr)),
      rd: Math.abs(gc2(row4,I.rd)),
      fa: gs(row4,I.fa), dp: gs(row4,I.dp),
      mg: Math.abs(gc2(row4,I.mg)),
      an: isAnn?1:0,
      parts:[], co:[],
      a1:0,a2:0,a3:0,a4:0,en:0,bb:0,
      a1p:0,e1p:0,a2p:0,e2p:0,bts:0
    };

    if(vtype==='1jour_disney'){
      c3.a1p=Math.abs(Math.round(gc2(row4,I.a1p)));
      c3.e1p=Math.abs(Math.round(gc2(row4,I.e1p)));
      c3.a2p=Math.abs(Math.round(gc2(row4,I.a2p)));
      c3.e2p=Math.abs(Math.round(gc2(row4,I.e2p)));
      c3.bts=Math.abs(Math.round(gc2(row4,I.bts)));
    } else if(vtype==='1jour'){
      c3.a1p=Math.abs(Math.round(gc2(row4,I.ad)));
      c3.e1p=Math.abs(Math.round(gc2(row4,I.enf)));
    } else {
      var ad2=Math.abs(Math.round(gc2(row4,I.ad)));
      var enf2=Math.abs(Math.round(gc2(row4,I.enf)));
      var cb3='D';
      var ncCh=1;
      ['S','D','TW','TR','Q'].forEach(function(t){
        if(CH[t]!==undefined&&CH[t]<row4.length){
          var v4=Math.abs(pf2(row4[CH[t]]));
          if(v4>0){cb3=t;ncCh=v4;}
        }
      });
      c3.cb=cb3; c3.nc_ch=ncCh;
      if(cb3==='S') c3.a1=ad2;
      else if(cb3==='TR') c3.a3=ad2;
      else c3.a2=ad2;
      c3.en=enf2;
    }

    c3.tot=(c3.a1p+c3.e1p+c3.a2p+c3.e2p+c3.bts+c3.a1+c3.a2+c3.a3+c3.a4+c3.en+c3.bb)||0;
    if(c3.nm||c3.nc){ clients.push(c3); cid2++; }
  }

  if(!clients.length) return null;

  return {
    id: vid2,
    type: vtype,
    nom: name,
    date: dateStr,
    dr: dateRet,
    pl: 49, ch: 0, mg: 0,
    ch_nb: (vtype==='sejour'||vtype==='disney_sejour'||vtype==='grand_voyage')?1:0,
    acc_nb: 0,
    lx: lx, tx: Object.keys(tx).length?tx:null,
    sr: 0, cl: clients
  };
}

function parsePSOrder(id, fields){
  var lc='', ho='', cb='', parts=[];

  // Detecter automatiquement les champs selon leur contenu
  // Lieu de depart: contient une heure (ex: "17h30 : Nimy") ou une adresse
  // Participants: contient des dates de naissance
  // Chambre: contient "chambre", "double", "single", "twin" etc.

  var fieldKeys = Object.keys(fields);
  var locField='', partField='', chambreField='';

  fieldKeys.forEach(function(k){
    var v = fields[k]||'';
    var vl = v.toLowerCase();
    // Champ lieu: contient horaire OU "lieu" OU ville connue
    if(!locField && (/\d+h\d+/i.test(v) || /gosselies|chapelle|nimy|louviere|ghislain|gembloux/i.test(v))){
      locField = k;
    }
    // Champ participants: contient DDN (JJ/MM/AAAA)
    if(!partField && /\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}/.test(v)){
      partField = k;
    }
    // Champ chambre: contient "chambre" ou type de chambre
    if(!chambreField && /chambre|double|single|twin|triple|quad|balneo|classique|charme|elegan/i.test(v)){
      chambreField = k;
    }
  });

  // Fallback: anciens IDs fixes
  if(!locField && fields['1093']) locField='1093';
  if(!partField && fields['1094']) partField='1094';

  // Parser le lieu
  if(locField && fields[locField]){
    var loc = fields[locField];
    var m = loc.match(/^(\d+[h:]\d+)\s*[:-]\s*(.+)$/i);
    if(m){ ho=m[1].replace(':','h'); lc=m[2].trim(); }
    else { lc=loc.trim(); }
    // Garder seulement jusqu au premier séparateur d adresse
    if(lc){
      var sep = lc.search(/[\u2014\u2013,]|(?:\s[-]\s)/);
      if(sep>0) lc = lc.substring(0,sep).trim();
    }
    // Normaliser vers une des 7 villes standard
    lc = normaliseLieu(lc);
  }

  // Parser le type de chambre
  if(chambreField && fields[chambreField]){
    var cv = fields[chambreField];
    var cvl = cv.toLowerCase();
    if(/double/.test(cvl)) cb='D';
    else if(/single|seule|individu/.test(cvl)) cb='S';
    else if(/twin/.test(cvl)) cb='TW';
    else if(/triple/.test(cvl)) cb='TR';
    else if(/quad/.test(cvl)) cb='Q';
    else cb=cv; // garder le texte brut
  }

  // Parser les participants (format PS: Prenom NOM DDN Nationalite Prenom2 NOM2 DDN2...)
  if(partField && fields[partField]){
    var SKIP={'BELGE':1,'FRANÇAISE':1,'FRANCAISE':1,'FRANÇAIS':1,'FRANCAIS':1,
      'NEERLANDAIS':1,'N\u00c9ERLANDAIS':1,'ALLEMAND':1,'ANGLAIS':1,
      'MONSIEUR':1,'MADAME':1,'MME':1,'MR':1,'NEE':1,'N\u00c9E':1,'ET':1};
    var DDN_RE = /(\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4})/g;
    var rawText = fields[partField];
    // Tokenize: split on DDN boundaries
    var toks = rawText.split(DDN_RE);
    var ti=0;
    while(ti < toks.length){
      var raw = toks[ti];
      var ddn2 = (ti+1 < toks.length && /^\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}$/.test(toks[ti+1])) ? toks[ti+1] : '';
      ti += ddn2 ? 2 : 1;
      // Clean words
      var wds = raw.replace(/[,;]+/g,' ').split(/\s+/).filter(function(w){
        return w.length>0 && !SKIP[w.toUpperCase()];
      });
      if(!wds.length && !ddn2) continue;
      if(!wds.length){ if(parts.length) parts[parts.length-1].ddn=ddn2; continue; }
      // Split nom/prenom: uppercase=nom, mixed=prenom
      var upW=wds.filter(function(w){return w===w.toUpperCase()&&w.length>1;});
      var mxW=wds.filter(function(w){return w!==w.toUpperCase()||w.length<=1;});
      var nm2='',pr2='';
      if(upW.length&&mxW.length){nm2=upW.join(' ');pr2=mxW.join(' ');}
      else if(upW.length>1){pr2=upW[0];nm2=upW.slice(1).join(' ');}
      else if(upW.length===1){nm2=upW[0];}
      else{pr2=wds[0];nm2=wds.slice(1).join(' ').toUpperCase();}
      if(nm2||pr2) parts.push({nm:nm2.trim(),pr:pr2.trim(),ddn:ddn2,ag:'+18'});
    }
  }

  return {lc:lc, ho:ho, cb:cb, parts:parts};
}

function _psLookup(orderId, callbacks){
  var status=document.createElement('div');
  status.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a3a5c;color:#fff;padding:16px 24px;border-radius:8px;z-index:99999;font-size:13px;min-width:280px;text-align:center';
  status.textContent='Recherche commande '+orderId+'...';
  document.body.appendChild(status);

  fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=orders/'+orderId+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
  .then(function(r){return r.json();})
  .then(function(data){
    var o=data.order||(data.orders&&data.orders[0])||null;
    if(!o){status.remove();alert('Commande '+orderId+' non trouvee dans PS');return;}
    var qty=1;
    if(o.associations&&o.associations.order_rows)
      qty=parseInt(o.associations.order_rows[0].product_quantity)||1;
    // Recuperer les vrais paiements (acomptes)
    fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=order_payments&filter[order_reference]='+o.reference+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
    .then(function(rp){return rp.json();})
    .then(function(pd){
      var recu=0;
      if(pd.order_payments && pd.order_payments.length){
        pd.order_payments.forEach(function(p){recu+=parseFloat(p.amount||0);});
      }
      if(callbacks.basic) callbacks.basic(o,qty,recu);
    })
    .catch(function(){
      if(callbacks.basic) callbacks.basic(o,qty,0);
    });
    Promise.all([
      fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=addresses/'+o.id_address_delivery+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}),
      fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=customers/'+o.id_customer+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}),
      fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=carts/'+o.id_cart+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();})
    ]).then(function(res){
      var addr=res[0].address||(res[0].addresses&&res[0].addresses[0])||null;
      var cu=res[1].customer||(res[1].customers&&res[1].customers[0])||null;
      var cart=res[2].cart||(res[2].carts&&res[2].carts[0])||null;
      if(callbacks.details) callbacks.details(addr,cu);
      var custId=0;
      if(cart&&cart.associations&&cart.associations.cart_rows)
        cart.associations.cart_rows.forEach(function(row){if(parseInt(row.id_customization)>0)custId=row.id_customization;});
      if(!custId){status.remove();if(callbacks.done)callbacks.done({lc:'',ho:'',parts:[]});return;}
      fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=customizations/'+custId+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
      .then(function(r){return r.json();})
      .then(function(cd){
        var cust=cd.customization||(cd.customizations&&cd.customizations[0])||null;
        var fields={};
        if(cust&&cust.associations&&cust.associations.customized_data_text_fields)
          cust.associations.customized_data_text_fields.forEach(function(f){fields[f.id_customization_field]=f.value;});
        status.remove();
        if(callbacks.done) callbacks.done(parsePSOrder(orderId,fields));
      }).catch(function(){status.remove();if(callbacks.done)callbacks.done({lc:'',ho:'',parts:[]});});
    }).catch(function(){status.remove();});
  })
  .catch(function(e){
    status.remove();
    console.log('PS lookup error: '+e.message);
  });
}

function lookupPSNew(){
  var nc=document.getElementById('ano').value.trim();
