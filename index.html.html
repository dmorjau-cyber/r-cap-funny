  if(!id||isNaN(id)){alert('Entrez un numero de commande valide');return;}
  document.getElementById('ano').value='NS '+id;
  _psLookup(id,{
    basic:function(o,qty,recu){
      var px=parseFloat(o.total_paid_tax_incl)||0;
      var ep=document.getElementById('apx');if(ep)ep.value=px;
      // Recu = vrai montant encaisse (acompte)
      var er=document.getElementById('arc');if(er)er.value=recu>0?recu.toFixed(2):px;
      var rb=document.getElementById('arb');if(rb)rb.value=o.reference||'';
      var qa=document.getElementById('aa1');if(qa)qa.value=qty;
      // Facture
      var afa=document.getElementById('afa');
      if(afa&&o.invoice_number&&o.invoice_number!='0') afa.value=o.invoice_number;
      var adp=document.getElementById('adp');
      if(adp&&o.invoice_date&&o.invoice_date!='0000-00-00 00:00:00')
        adp.value=o.invoice_date.substring(0,10).split('-').reverse().join('/');
    },
    details:function(addr,cu){
      if(addr){
        var nm=document.getElementById('anm');if(nm)nm.value=(addr.lastname||'').toUpperCase();
        var pr=document.getElementById('apr');if(pr)pr.value=addr.firstname||'';
        var te=document.getElementById('ate');if(te)te.value=addr.phone_mobile||addr.phone||'';
      }
      if(cu){var em=document.getElementById('ama');if(em)em.value=cu.email||'';}
    },
    done:function(parsed){
      if(parsed.lc){
        var ach=document.getElementById('ach');
        if(ach){
          for(var i=0;i<ach.options.length;i++){
            if(ach.options[i].text.toLowerCase().indexOf(parsed.lc.toLowerCase())>=0){ach.selectedIndex=i;break;}
          }
          // Si pas trouve, remplir directement
          if(ach.tagName==='INPUT') ach.value=parsed.lc;
        }
        var acc=document.getElementById('acc');if(acc&&parsed.ho)acc.value=parsed.ho;
      }
      // Type de chambre
      if(parsed.cb){
        var acb=document.getElementById('acc');
        if(acb){
          for(var i=0;i<acb.options.length;i++){
            if(acb.options[i].value===parsed.cb){acb.selectedIndex=i;break;}
          }
        }
      }
      if(parsed.parts&&parsed.parts.length>0){
        window._pendingParts=parsed.parts;
        var qa=document.getElementById('aa1');if(qa)qa.value=parsed.parts.length;
      }
    }
  });
}

function calcAC(vid){
  var v=VY.find(function(x){return x.id==vid;});
  if(!v||!v.ht||!v.ht.length) return;
  // Categorie choisie
  var achEl=document.getElementById('ach');
  var catNm=achEl?achEl.value:'';
  var cat=v.ht.find(function(h){return h.n===catNm;})||v.ht[0];
  // Nombre de personnes
  var nb=+(gv('aa1')||0)+(+(gv('aa2')||0))+(+(gv('aa3')||0))+(+(gv('aa4')||0));
  if(!nb) nb=1;
  // Prix base selon nb personnes
  var base=nb===1?cat.p1:nb===2?cat.p2:nb===3?(cat.p3||cat.p2):nb>=4?(cat.p4||cat.p2):cat.p1;
  // Enfants/bébés
  var ne=+(gv('ae1')||0), nb2=+(gv('abb')||0);
  if(ne) base+=ne*(cat.pe||0);
  if(nb2) base+=nb2*(cat.pb||0);
  // Options cochées
  var optTotal=0;
  if(v.opts) v.opts.forEach(function(o,i){
    var cb=document.getElementById('aopt'+i);
    if(cb&&cb.checked) optTotal+=o.p;
  });
  var total=(base+optTotal).toFixed(2);
  var ep=document.getElementById('apx'); if(ep) ep.value=total;
  var er=document.getElementById('arc'); if(er) er.value=total;
}

  if(!v) return;

  // Modal avec champ ID produit PS
  var html='<div class="ov" id="ov" onclick="cmo(event)"><div class="mo" style="width:520px">'
    +'<div class="mot">&#8659; Importer toutes les commandes PS</div>'
    +'<p style="font-size:12px;color:#666;margin-bottom:12px">'
    +'Entrez l\'ID du produit PS pour importer toutes les commandes en une fois.<br>'
    +'(L\'ID se trouve dans l\'URL du produit : /catalog/products/<strong>ID</strong>/edit)</p>'
    +'<div class="fg" style="margin-bottom:10px"><label>ID Produit PS</label>'
    +'<input type="number" id="ps_pid" value="'+(v.psid||'')+'" placeholder="ex: 573" style="font-size:14px;padding:8px"></div>'
    +(v.psid?'<p style="font-size:11px;color:#27ae60;margin-bottom:6px">✓ ID mémorisé : '+v.psid+'</p>':'')
    +'<div id="ps_import_status" style="font-size:12px;min-height:20px;margin-bottom:8px"></div>'
    +'<div id="ps_import_log" style="font-size:11px;color:#666;max-height:200px;overflow-y:auto;'
    +'background:#f8f9fc;border-radius:6px;padding:8px;display:none;margin-bottom:8px"></div>'
    +'<div class="mof">'
    +'<button class="btn" onclick="cm()">Annuler</button>'
    +'<button class="btn bp" onclick="doImportAllPS('+vid+')">&#8659; Importer</button>'
    +'</div></div></div>';
  document.getElementById('mod').innerHTML=html;
}

function doImportAllPS(vid){
  var v=VY.find(function(x){return x.id==vid;});
  if(!v) return;
  var pid=document.getElementById('ps_pid').value.trim();
  if(!pid||isNaN(pid)){alert('Entrez un ID produit valide');return;}
  // Mémoriser l'ID PS sur le voyage
  if(!v.psid) { v.psid=pid; autoSave(); rd(); }

  var status=document.getElementById('ps_import_status');
  var log=document.getElementById('ps_import_log');
  status.style.color='#1a3a5c';
  status.textContent='Chargement des commandes...';
  log.style.display='none';
  log.innerHTML='';

  // Etape 1: Recuperer toutes les order_details du produit
  fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=order_details&filter[product_id]=['+pid+']&display=[id,id_order,product_quantity,id_customization]&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
  .then(function(r){return r.json();})
  .then(function(data){
    var details=data.order_details||[];
    if(!details.length){
      status.style.color='#e67e22';
      status.textContent='Aucune commande trouvee pour ce produit.';
      return;
    }
    status.textContent=details.length+' commande(s) trouvee(s) - Import en cours...';
    log.style.display='block';

    // Import sequentiel pour eviter de surcharger l API
    var imported=0, skipped=0, errors=0;
    var idx=0;

    function importNext(){
      if(idx>=details.length){
        // Termine!
        status.style.color='#27ae60';
        status.textContent='Import termine: '+imported+' importe(s), '+skipped+' deja present(s)'+(errors?' '+errors+' erreur(s)':'');
        autoSave();
        setTimeout(function(){cm();rd();},1500);
        return;
      }
      var det=details[idx++];
      var orderId=det.id_order;
      var qty=parseInt(det.product_quantity)||1;
      var custId=parseInt(det.id_customization)||0;

      // Verifier si deja present
      var nc='NS '+orderId;
      if(v.cl.find(function(c){return c.nc===nc;})){
        skipped++;
        log.innerHTML+='<div style="color:#888">⏭ NS '+orderId+' - deja present</div>';
        log.scrollTop=log.scrollHeight;
        importNext();
        return;
      }

      // Charger la commande
      fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=orders/'+orderId+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}})
      .then(function(r){return r.json();})
      .then(function(od){
        var o=od.order||(od.orders&&od.orders[0])||null;
        if(!o){errors++;importNext();return;}

        // Charger adresse + client + customization en parallele
        var reqs=[
          fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=addresses/'+o.id_address_delivery+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}),
          fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=customers/'+o.id_customer+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();})
        ];
        if(custId>0){
          reqs.push(fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=customizations/'+custId+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}));
        }

        Promise.all(reqs).then(function(res){
          var addr=res[0].address||(res[0].addresses&&res[0].addresses[0])||null;
          var cu=res[1].customer||(res[1].customers&&res[1].customers[0])||null;
          var cust=res[2]?(res[2].customization||(res[2].customizations&&res[2].customizations[0])||null):null;

          // Parser champs perso
          var fields={};
          if(cust&&cust.associations&&cust.associations.customized_data_text_fields)
            cust.associations.customized_data_text_fields.forEach(function(f){fields[f.id_customization_field]=f.value;});
          var parsed=parsePSOrder(orderId,fields);

          // Construire le client
          var px=parseFloat(o.total_paid_tax_incl)||0;
          var inv=o.invoice_number&&o.invoice_number!='0'?o.invoice_number:'';
          var invDate=o.invoice_date&&o.invoice_date!='0000-00-00 00:00:00'
            ?o.invoice_date.substring(0,10).split('-').reverse().join('/'):'';

          // Recuperer les paiements reels
          var rcFetch = fetch('https://sxcedrikrbgkrqrxuvoi.supabase.co/functions/v1/index-ts?endpoint=order_payments&filter[order_reference]='+o.reference+'&display=full&output_format=JSON', {headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json();}).catch(function(){return {};});
          rcFetch.then(function(pd){
            var recu=0;
            if(pd.order_payments && pd.order_payments.length)
              pd.order_payments.forEach(function(p){recu+=parseFloat(p.amount||0);});
            // Nombre de personnes et type de chambre
            var cbCode = parsed.cb||'';
            var c={
              id: Date.now()+imported,
              nc: 'NS '+orderId,
              nm: addr?(addr.lastname||'').toUpperCase():(o.lastname||'').toUpperCase(),
              pr: addr?(addr.firstname||''):(o.firstname||''),
              ml: cu?(cu.email||''):'',
              tl: addr?(addr.phone_mobile||addr.phone||''):'',
              lc: parsed.lc||'',
              ho: parsed.ho||'',
              hotel: '',
              a1:0, a2:0, a3:0, a4:0, en:0, bb:0,
              tot: qty,
              cb: cbCode,
              ps: '', fr: 0, rd: 0,
              px: px, rc: recu>0?recu:px,
              fa: inv, dp: invDate,
              rb: o.reference||'',
              an: 0,
              parts: parsed.parts||[]
            };
            // Distribuer les adultes selon le type de chambre
            if(v.type==='sejour'){
              if(cbCode==='S') c.a1=qty;
              else if(cbCode==='TR'||cbCode==='Q') c.a3=qty;
              else c.a2=qty; // D, TW = chambre double par defaut
            } else {
              c.a1=qty; // 1jour: tout dans a1
            }
            v.cl.push(c);
            imported++;
            log.innerHTML+='<div style="color:#27ae60">✓ NS '+orderId+' - '+c.nm+(c.pr?' '+c.pr:'')
              +' ('+qty+'p - prix:'+px+'€ recu:'+c.rc+'€'+(c.cb?' chambre:'+c.cb:'')+')</div>';
            log.scrollTop=log.scrollHeight;
            status.textContent='Import: '+imported+'/'+details.length+'...';
            setTimeout(importNext, 200);
          });
          return; // importNext sera appelé dans rcFetch
          var c={id:0}; // dead code pour fermer le bloc

        }).catch(function(){errors++;importNext();});
      }).catch(function(){errors++;importNext();});
    }

    importNext();
  })
  .catch(function(e){
    status.style.color='#c0392b';
    status.textContent='Erreur: '+e.message;
  });
}

// START
loadData();
loadPSProducts();
</script>
